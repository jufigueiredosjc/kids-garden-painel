function neuroRec(level,dev){
 const young=["Nursery","Kinder","KinderPlus","K1"].includes(level);
 if(dev.includes("Speaking")||dev.includes("Phonics"))return young?"From a neuroscience standpoint, I recommend more multisensory phonics play — songs, gestures and games — since speech and sound mapping are built through movement and repetition at this age.":"To strengthen oral confidence, I recommend low-pressure speaking routines and recasting rather than correction, which keeps the language-confidence loop open.";
 if(dev.includes("Listening"))return "Increasing comprehensible input (slightly above current level, with strong visual context) will accelerate listening, the foundation all other skills build on.";
 if(dev.includes("Writing")||dev.includes("Use of English"))return "I suggest scaffolded writing with models and spaced review, so structures move from working memory into long-term recall.";
 return young?"Continued playful, repetitive immersion will keep consolidating English during these high-plasticity years.":"Maintaining varied, meaningful practice will keep consolidating fluency and confidence.";
}
function generateNarrative(cid,name,audience){
 const c=getClass(cid);const st=studentStats(cid,name);const age=LEVELS[c.level].age;
 const prof=strongSkills(cid,name),dev=weakSkills(cid,name);
 const tests=[];const t=STATE.tests[cid]||{};Object.entries(t).forEach(([u,rows])=>{const r=rows.find(x=>x.student===name);if(r&&r.score!=null)tests.push({u:Number(u),score:r.score});});
 tests.sort((a,b)=>a.u-b.u);
 const p=[];
 if(audience==='teacher')p.push(`Teaching snapshot for <b>${esc(name)}</b> — ${esc(c.name)} (${age}). A specialist read of the data to guide your planning.`);
 else p.push(`Specialist pedagogical analysis prepared for Ms. Lidiane (Pedagogical Coordination). Student: <b>${esc(name)}</b> — ${esc(c.name)} (${age}), teacher ${esc(c.teacher)}.`);
 if(st.seen===0){
   if(tests.length){const last=tests[tests.length-1];
     p.push(`Daily-report data is not yet logged for ${esc(name)}, so this is a preliminary analysis based on assessment data. Most recent ${testName(c).toLowerCase()} (${trackName(c)} ${last.u}): ${last.score}. ${(t=>t===2?'A solid result that suggests the core competencies for this level are taking hold.':t===1?'A developing result with clear room to grow.':'Below the expected range, extra support is advised.')(testTier(last.score,c))} ${neuroRec(c.level,dev)} Once ${esc(c.teacher)} begins logging daily reports, attendance, homework and skills will complete this profile.`);}
   else p.push(`There is not enough logged data yet to assess ${esc(name)}. As ${esc(c.teacher)} records daily reports and end-of-${trackName(c).toLowerCase()} assessments, this analysis will update automatically.`);
 }
 else{
  if(st.attRate>=90)p.push(`Attendance is excellent (${st.attRate}%), giving ${esc(name)} the consistent exposure bilingual acquisition depends on.`);
  else if(st.attRate>=75)p.push(`Attendance is good (${st.attRate}%), though ${st.a} absence(s) are worth monitoring, as regular input strongly supports retention at this age.`);
  else p.push(`Attendance is a concern (${st.attRate}%, ${st.a} absences). At ${age}, frequent gaps interrupt the repetition the young brain needs to consolidate English — I recommend coordination contacts the family.`);
  if(st.hwRate!=null){if(st.hwRate>=80)p.push(`Homework completion is strong (${st.hwRate}%), reinforcing class learning at home.`);else if(st.hwRate>=50)p.push(`Homework is inconsistent (${st.hwRate}%); a short, playful home routine would help.`);else p.push(`Homework completion is low (${st.hwRate}%); I suggest agreeing a light, enjoyable practice habit with the family.`);}
  if(prof.length)p.push(`${esc(name)} shows confidence in ${prof.map(esc).join(', ')}.`);
  if(dev.length)p.push(`Priority development areas are ${dev.map(esc).join(', ')}; targeted multisensory practice (movement, songs and visuals) will strengthen these.`);
  if(!prof.length&&!dev.length)p.push(`End-of-${trackName(c).toLowerCase()} skill assessments are still pending; once completed they will sharpen this profile.`);
  if(tests.length){const last=tests[tests.length-1];p.push(`Most recent ${testName(c).toLowerCase()} (${trackName(c)} ${last.u}): ${last.score}. ${(t=>t===2?'A solid result.':t===1?'A developing result with room to grow.':'Below the expected range, extra support is advised.')(testTier(last.score,c))}`);}
  p.push(neuroRec(c.level,dev));
  p.push(`Overall, ${esc(name)} is ${(st.attRate>=75&&dev.length<=1)?'progressing well':'a child to support closely'} this term. Kids Garden remains committed to nurturing confidence, fluency and a love of English.`);
 }
 return p.join(' ');
}

      if(x==='cambridge_prep')return `<span class="pill" style="background:#6A1B9A;color:#fff;font-weight:700;margin:0 6px 6px 0;display:inline-block">🎓 Cambridge Prep</span>`;
      return `<span class="pill" style="background:#37474F;color:#fff;font-weight:700;margin:0 6px 6px 0;display:inline-block">${esc(programLabel(x))}</span>`;

function actionFollowupsCard(cid,name){return (()=>{const acts=studentActions(cid,name);if(!acts.length)return '';return `<div class="card"><h3>🚦 Action follow-ups</h3><p class="hint">Attention points logged by the teacher and the coordination's guidance — kept in this child's record.</p>${acts.map(a=>`<div class="actrow ${a.done?'done':''}" style="display:block"><div><b>${esc(a.solution||a.point||'')}</b> <span class="muted small">${esc(a.date||'')}</span> ${a.done?'<span class="badge b-present">resolved</span>':'<span class="badge b-late">open</span>'}</div>${a.point?`<div class="small muted">Point: ${esc(a.point)}</div>`:''}${actionThreadHtml(cid,a)}</div>`).join('')}</div>`;})();}

/* All-students report: every active child in the class, one A4 page each, header repeats if a report spills over. */
function reportBlock(cid,n){const c=getClass(cid);return `<table class="rpt-block"><thead><tr><td><div class="rpt-runhead">Progress Report · ${esc(displayName(cid,n))} · ${esc(c.name)} ${esc(c.time)} · ${esc(c.teacher)}</div></td></tr></thead><tbody><tr><td>${progressReport(cid,n,{bare:true})}</td></tr></tbody></table>`;}
function reportBlocks(cid){const c=getClass(cid);if(!c)return '';return activeStudents(c).map(n=>reportBlock(cid,n)).join('');}
function progressReportAll(cid){
 const c=getClass(cid);if(!c)return '';
 const studs=activeStudents(c);
 return `<div class="no-print" style="margin-bottom:14px"><button class="back" onclick="RPT={};setCoordTab('reports')">← Back</button>
   <button class="btn navy" onclick="printAllReports('${cid}')" style="margin-left:8px">🖨 Print all / Save PDF</button>
   <button class="btn" style="background:#1B7A3A;border-color:#1B7A3A;margin-left:6px" onclick="downloadEachReport('${cid}','coord')">⬇️ Download each (individual files)</button>
   <span class="muted small" style="margin-left:8px"><b>${esc(c.name)} ${esc(c.time)}</b> — ${studs.length} student${studs.length===1?'':'s'} · one clean page each, ready to send to parents</span></div>
   <div class="flag ok no-print" style="margin-bottom:10px"><span class="fi">🖨</span><div>Use <b>Print all / Save PDF</b> for a clean parent-ready file (no dashboard, no menus). In the print dialog, set <b>A4</b> and turn <b>“Headers and footers” OFF</b> to remove the date/URL.</div></div>
   ${studs.length?reportBlocks(cid):'<div class="card"><p class="muted">No active students in this class.</p></div>'}`;
}
/* Open a clean, parent-ready print window (no dashboard chrome) using the page's own styles. */
/* Build the full, self-contained print-ready HTML document (styles + report), reused by print and download. */
function reportDocString(title,html){
 let css='';document.querySelectorAll('style').forEach(function(s){css+=s.outerHTML;});
 var compact='<style>@page{size:A4;margin:9mm}*{-webkit-print-color-adjust:exact;print-color-adjust:exact}body{background:#fff;margin:0;padding:10px;font-size:11.5px;line-height:1.33;color:#1f2937}.no-print{display:none!important}'
  +'.rpt-card{border:none!important;box-shadow:none!important;padding:0!important;margin:0 0 4px!important}'
  +'.logo-img.report{max-height:42px!important;width:auto!important}'
  +'h2{font-size:17px!important}h3{font-size:13px!important;margin:7px 0 3px!important}h5{font-size:11.5px!important;margin:2px 0!important}'
  +'.sep,hr.sep{margin:5px 0!important}p{margin:3px 0!important}ul{margin:2px 0 4px 15px!important}li{margin-bottom:2px!important}'
  +'.narr{padding:6px 9px!important}.narr ul{margin:0 0 0 14px!important}'
  +'.stat-grid{gap:6px!important;margin:2px 0 4px!important}.stat{padding:4px!important}.stat .n{font-size:19px!important}.stat .l{font-size:9px!important}'
  +'table{font-size:10.5px!important}th,td{padding:3px 5px!important}.tbl-wrap{margin:2px 0!important}'
  +'.comp{padding:5px 8px!important;margin:4px 0!important}.card{padding:7px 9px!important;margin:5px 0!important}'
  +'.hint{font-size:9.5px!important;margin:2px 0!important;line-height:1.3}'
  +'.rpt-block+.rpt-block{break-before:page;page-break-before:always}.rpt-block thead{display:table-header-group}.rpt-runhead{display:block!important;font-size:9px!important}'
  +'h2,h3,h5{break-after:avoid;page-break-after:avoid}.stat-grid,tr,.comp,.flag{break-inside:avoid;page-break-inside:avoid}.narr,.card,.tbl-wrap{break-inside:auto}'
  +'</style>';
 return '<!doctype html><html><head><meta charset="utf-8"><title>'+esc(title)+'</title>'+css+compact+'</head><body>'+html+'</body></html>';
}
/* Download a single self-contained HTML file (a full, print-ready report). */
function downloadHtmlFile(filename,content){try{const blob=new Blob([content],{type:'text/html;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;a.style.display='none';document.body.appendChild(a);a.click();setTimeout(function(){try{document.body.removeChild(a);URL.revokeObjectURL(url);}catch(e){}},200);}catch(e){toast('Download failed: '+(e&&e.message||e));}}
/* Download EACH active student's report as a separate file (parent or coordination), for fast one-by-one sending. */
function downloadEachReport(cid,mode){const c=getClass(cid);if(!c)return;const studs=activeStudents(c);if(!studs.length){toast('No active students in this class');return;}
 toast('⬇️ Preparing '+studs.length+' files… allow multiple downloads if your browser asks.');
 studs.forEach(function(n,i){setTimeout(function(){
   const block=mode==='parent'?parentBlock(cid,n):reportBlock(cid,n);
   const doc=reportDocString('Progress Report — '+displayName(cid,n),block);
   const safe=(displayName(cid,n)||n).replace(/[^A-Za-z0-9À-ÿ \-]/g,'').replace(/\s+/g,' ').trim()||'student';
   downloadHtmlFile('Progress Report - '+safe+' ('+(mode==='parent'?'Parents':'Coordination')+').html',doc);
 },i*350);});}

function phonLevelMeta(v){
 if(v==='Secure (reads & writes)')return{e:'✍️',t:'Secure',bg:'#4FB62B'};

/* AI specialist phonics comment — reads the per-sound levels, the 4 Jolly Phonics skills the teacher
   ticked, and the written observations, to give coordination & teacher a brief, neuroscience-based conclusion.
   Supports, never replaces, the teacher's judgement. Generated client-side; nothing stored. */
function phonicsComment(cid,name,list,sec,bl,rec,ns){
 const n=list.length;if(!n)return '';
 const first=esc((displayName(cid,name)||name).split(' ')[0]);
 const skCount={h:0,s:0,f:0,b:0};list.forEach(e=>{const sk=e.phsk||{};['h','s','f','b'].forEach(k=>{if(sk[k])skCount[k]++;});});
 const pct=k=>n?Math.round(skCount[k]/n*100):0;
 const labels={h:'hearing the sound',s:'saying the pure sound',f:'forming the letter',b:'blending to read'};
 const obs=list.map(e=>e.obs||'').join(' ').toLowerCase();
 const reading=sec+bl;let parts=[];
 if(sec>=Math.ceil(n*0.6))parts.push(`${first} reads and writes most of the sounds worked on with security — a solid Jolly Phonics foundation, ready to extend to digraphs and longer blends.`);
 else if(reading>=Math.ceil(n*0.5))parts.push(`${first} has reached the key milestone of <b>blending sounds to read</b> on most sounds — where decoding really takes off; keep consolidating so it becomes automatic.`);
 else if(rec>=Math.ceil(n*0.5))parts.push(`${first} is securely <b>recognising</b> the sounds and building the aural foundation; the next target is blending two or three known sounds into a word (s-a-t → sat).`);
 else parts.push(`${first} is in the early, exploratory stage with the sounds and will progress best with frequent, playful, multisensory exposure before pushing decoding.`);
 const strong=['h','s','f','b'].filter(k=>pct(k)>=70);const weak=['h','s','f','b'].filter(k=>pct(k)<=40);
 if(strong.length)parts.push(`Strongest so far: ${strong.map(k=>labels[k]).join(', ')}.`);
 if(weak.length)parts.push(`Still developing: ${weak.map(k=>labels[k]).join(', ')}.`);
 if(pct('b')<=40&&(pct('h')>=60||pct('s')>=60))parts.push(`The ear and voice are ahead of decoding — prioritise short daily <b>blending</b> drills using only the secure sounds.`);
 else if(pct('f')<=40&&pct('s')>=60)parts.push(`Sounds are known orally but <b>letter formation</b> lags — anchor each sound with see–say–trace (air-writing, sand, finger tracing).`);
 if(obs.indexOf('confus')>=0||obs.indexOf('mix')>=0)parts.push(`Separate the confusable sounds in time and give each a strong action and visual anchor.`);
 if(obs.indexOf('shy')>=0||obs.indexOf('quiet')>=0||obs.indexOf('confiden')>=0)parts.push(`Keep oral phonics low-pressure so the affective filter stays low and the sounds become automatic.`);
 parts.push(`Neuroscience note: one new sound at a time plus short, spaced retrieval of known sounds wires the sound–symbol link far more durably than long sessions.`);
 return `<div style="margin-top:12px;border-top:1px dashed #CBA6E0;padding-top:10px"><b>🧠 Phonics specialist comment</b> <span class="muted small">(AI — Jolly Phonics for foreign learners · neuroscience-based)</span>
  <p class="small" style="line-height:1.65;margin-top:5px">${parts.slice(0,5).join(' ')}</p>
  <p class="small muted" style="margin-top:5px">Skill coverage across ${n} sound${n>1?'s':''}: 👂 hears ${pct('h')}% · 🗣 says ${pct('s')}% · ✍️ forms ${pct('f')}% · 🔗 blends ${pct('b')}%. Auto-generated from the teacher's records — it supports, never replaces, your judgement.</p></div>`;
}

 const list=Object.values(bySound).sort((a,b)=>(a.date||'').localeCompare(b.date||''));

   const ticks=PHONICS_SKILLS.map(([k,emo,short])=>`<span title="${esc(short)}" style="opacity:${sk[k]?1:.22}">${emo}</span>`).join('');
   return `<span class="phchip" title="${esc(e.lbl)} — ${esc(m.t)}"><b>${esc(e.lbl)}</b> <span class="phbadge" style="background:${m.bg}">${m.e}</span> <span class="phsktiny">${ticks}</span></span>`;}).join('');

   <p class="small"><b>${list.length}</b> sound${list.length>1?'s':''} practised · <b>${sec}</b> ✍️ secure · <b>${bl}</b> 🔗 blending · <b>${rec}</b> 👂 recognising${ns?` · <b>${ns}</b> ◻ need support`:''}</p>
   <div class="phchips">${chips}</div>
   <p class="small muted" style="margin-top:8px">Each chip = a sound. Badge = overall level. Small icons = skills seen (👂 hears · 🗣 says · ✍️ forms the letter · 🔗 blends to read; faded = not yet).</p>${phonicsComment(cid,name,list,sec,bl,rec,ns)}</div>`;}
/* Auto pedagogical orientation — reads the structured signals + the teacher's own written
   observations (theme detection) and returns a brief, neuroscience-based steer for the teacher.
   Supports, never replaces, the teacher's judgement. Generated client-side; nothing is stored. */
function pedagogicalOrientation(cid,name){
 const c=getClass(cid);const st=studentStats(cid,name);const seen=st.seen||0;if(!seen)return null;
 const weak=weakSkills(cid,name),strong=strongSkills(cid,name);
 const rows=studentRows(cid,name);
 const obs=rows.map(function(r){return r.obs||'';}).join(' ').toLowerCase();
 let focus=[],actions=[],strengths=[];
 const T=[
  {k:['shy','quiet','timid','reluctant','afraid','nervous','soft voice','spoke softly','low voice'],f:'speaking confidence',a:'Lower the affective filter with predictable sentence frames and pair work, so output feels safe and becomes automatic through repetition.'},
  {k:['distract','off task','off-task','restless','fidget','lose focus','short attention','wandering','difficulty focus','hard to focus','attention span'],f:'attention & focus',a:'Chunk tasks into short, multisensory bursts with movement breaks — young brains consolidate through spaced, varied repetition rather than long blocks.'},
  {k:['vocabulary','new words','word bank','lexical','remember the word','forgot the word'],f:'vocabulary retention',a:'Recycle target words in meaningful contexts across several classes (retrieval practice) to move them into long-term memory.'},
  {k:['phonic','blend','sound','decod','satpin','letter sound','segment'],f:'phonics & decoding',a:'Keep phonics multisensory (see–say–trace–blend) and consolidate each sound with quick daily retrieval before adding the next.'},
  {k:['writing','spelling','letter formation','handwriting','cursive'],f:'writing & encoding',a:'Rehearse orally first, then model and scaffold before independent writing — production follows comprehension.'},
  {k:['listening','comprehension','follow instruction','understand instruction','did not understand','does not understand'],f:'listening comprehension',a:'Anchor input with gesture, visuals and slower repeated modelling before demanding language back.'},
  {k:['peer','classmate','conflict','behavior','behaviour','talking to','influenced','distracted by'],f:'social regulation',a:'Channel social energy with structured pair/group roles and strategic seating so interaction fuels learning instead of pulling focus.'},
  {k:['struggl','difficult','needs support','need help','confused','help remember','hard time'],f:'scaffolded support',a:'Use visuals and worked examples, then gradually release responsibility, checking understanding with quick low-stakes retrieval.'}
 ];
 T.forEach(function(t){if(t.k.some(function(w){return obs.indexOf(w)>=0;})){focus.push(t.f);actions.push(t.a);}});
 const P=[
  {k:['independ','autonom','minimal support','on her own','on his own','by himself','by herself','no support','all on'],s:'works with strong autonomy'},
  {k:['participat','engag','eager','enthusiastic','very active','volunteer','confident','excellent','amazing'],s:'engages with enthusiasm'},
  {k:['read with no support','reads well','can read','reads independently'],s:'reading ahead of expectations'}
 ];
 P.forEach(function(p){if(p.k.some(function(w){return obs.indexOf(w)>=0;}))strengths.push(p.s);});
 if(st.attRate!=null&&st.attRate<75&&seen>=3){focus.unshift('attendance consistency');actions.unshift('Language is built by frequent, spaced exposure, so protecting attendance will do more for progress than any single lesson.');}
 if(!c.fluent&&st.hwRate!=null&&st.hwRate<60&&(st.hd+st.hm)>=2){focus.push('home reinforcement');actions.push('When homework is set, keep it short and playful so it reinforces class content and consolidates memory at home.');}
 weak.slice(0,2).forEach(function(w){focus.push(w.toLowerCase());});
 strong.slice(0,2).forEach(function(s){strengths.push('a solid command of '+s.toLowerCase());});
 function uniq(a){var o=[],sn={};a.forEach(function(x){var k=x.toLowerCase();if(!sn[k]){sn[k]=1;o.push(x);}});return o;}
 focus=uniq(focus).slice(0,3);actions=uniq(actions).slice(0,2);strengths=uniq(strengths).slice(0,2);
 const first=esc((displayName(cid,name)||name).split(' ')[0]);
 const eng=strengths.length?('shows '+esc(strengths[0])):'is still settling into a clear pattern';
 let profile=first+' '+eng;
 if(st.attRate!=null)profile+=', with attendance around '+st.attRate+'% over '+seen+' recorded class'+(seen===1?'':'es');
 profile+='.';
 const focusTxt=focus.length?('<b>Where to focus:</b> '+focus.map(esc).join(', ')+'.'):'<b>Where to focus:</b> keep building all four skills through varied, meaningful input.';
 const actTxt=actions.length?('<b>What to do:</b> '+actions.map(esc).join(' ')):'<b>What to do:</b> prioritise comprehensible, meaningful input and frequent low-stakes retrieval.';
 const strTxt=strengths.length?(' <b>Leverage:</b> the child '+esc(strengths[0])+' — use that as the entry point for harder tasks.'):'';
 return profile+' '+focusTxt+' '+actTxt+strTxt;
}
function pedagogicalOrientationCard(cid,name){const t=pedagogicalOrientation(cid,name);if(!t)return '';return `<div class="card" style="border:2px solid #1B4F86;background:linear-gradient(120deg,#F1F7FF,#FFFDF6)"><h3>🧠 Teacher's orientation — neuroscience-based</h3><p class="hint">A brief, automatic reading of everything recorded about this child (including your own observations), to help you aim your work. It supports — never replaces — your judgement.</p><p style="line-height:1.65;font-size:15px">${t}</p></div>`;}
function studentReport(cid,name){

 // current skills

      if(x==='cambridge_prep')return `<span class="pill" style="background:#6A1B9A;color:#fff;font-weight:700;margin:0 6px 6px 0;display:inline-block">🎓 Cambridge Prep</span>`;
      return `<span class="pill" style="background:#37474F;color:#fff;font-weight:700;margin:0 6px 6px 0;display:inline-block">${esc(programLabel(x))}</span>`;
    });
    return `<div class="card" style="border-color:#9FB8DC;background:linear-gradient(120deg,#EAF1FB,#F7FAFF)"><h3>🌟 Extra activities</h3><p class="hint">Cross-referenced by name + date of birth. Beyond ${esc(programLabel(cid))}, this child also takes part in:</p><div>${parts.join('')}</div>${others.indexOf('cambridge_prep')>=0?'<p class="small muted" style="margin-top:6px">Cambridge Prep: enrolment shown for reference — class-by-class history is not fully tracked here.</p>':''}</div>`;})()}
  <div class="card"><h3>📊 Snapshot</h3>
   <div class="stat-grid">
     <div class="stat blue"><div class="n">${st.attRate==null?'—':st.attRate+'%'}</div><div class="l">Attendance</div></div>
     <div class="stat orange"><div class="n">${st.hwRate==null?'—':st.hwRate+'%'}</div><div class="l">Homework done</div></div>
     <div class="stat"><div class="n">${st.seen}</div><div class="l">Classes recorded</div></div>
     ${c.kidDollar?`<div class="stat purple"><div class="n">$${st.dollars}</div><div class="l">Kid's Dollars</div></div>`:''}
   </div></div>
  ${(c.kidDollar&&STATE.dollarAdjNote&&STATE.dollarAdjNote[cid+'::'+name])?`<div class="flag" style="background:#F3E9FB;border-color:#CBA6E0"><span class="fi">💵</span><div><b>Kid's Dollars manually adjusted.</b> Reason: ${esc(STATE.dollarAdjNote[cid+'::'+name].note||'')} <span class="muted small">(${esc((STATE.dollarAdjNote[cid+'::'+name].ts||'').slice(0,10))}${STATE.dollarAdjNote[cid+'::'+name].by?(' · '+esc(STATE.dollarAdjNote[cid+'::'+name].by)):''})</span></div></div>`:''}
  ${c.special==='cambridge'?cambBandCard(name):''}
  <div class="card"><h3>🧑‍🔬 Pedagogical summary</h3><div class="narr"><ul style="margin:0 0 0 18px">${narrativeBullets(cid,name).map(x=>`<li style="margin-bottom:5px">${x}</li>`).join('')}</ul></div></div>
  <div class="card"><h3>🎯 Skills & competencies — focus & strengths</h3>
   <p class="hint">Based on the teacher's saved assessment (Skills & Competencies tab). Updates automatically with each assessment.</p>
   <p class="small"><b>Focus areas (developing):</b> ${weak.length?weak.map(w=>`<span class="chip bad">${esc(w)}</span>`).join(' '):'<span class="muted">none flagged</span>'}</p>
   <p class="small" style="margin-top:8px"><b>Strengths (proficient):</b> ${strong.length?strong.map(w=>`<span class="chip">${esc(w)}</span>`).join(' '):'<span class="muted">to be assessed</span>'}</p>
   ${Object.keys(cur).length?`<div class="tbl-wrap" style="margin-top:10px"><table><tr>${set.map(s=>`<th>${esc(s)}</th>`).join('')}</tr><tr>${set.map(s=>{const v=cur[s]||'Not assessed';return `<td><span class="badge ${ratingClass(v)}">${esc(v)}</span></td>`;}).join('')}</tr></table></div>`:''}
  </div>
  ${c.track==='phonics'?phonicsProgressCard(cid,name):''}
  <div class="card"><h3>📈 ${c.fluent?'Participation & engagement':'Development charts'}</h3>
   <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px">
     <div><div class="small muted center" style="margin-bottom:6px">Attendance</div><div style="height:200px"><canvas id="cAtt"></canvas></div></div>
     ${c.fluent?`<div><div class="small muted center" style="margin-bottom:6px">Classes attended per month</div><div style="height:200px"><canvas id="cPart"></canvas></div></div>`:`<div><div class="small muted center" style="margin-bottom:6px">Homework</div><div style="height:200px"><canvas id="cHw"></canvas></div></div>`}
     ${(!c.fluent&&tests.length)?`<div><div class="small muted center" style="margin-bottom:6px">Test scores</div><div style="height:200px"><canvas id="cTest"></canvas></div></div>`:''}
     ${(!c.fluent&&c.kidDollar)?`<div><div class="small muted center" style="margin-bottom:6px">Kid's Dollars (cumulative)</div><div style="height:200px"><canvas id="cDol"></canvas></div></div>`:''}
   </div>${c.fluent?'<p class="hint" style="margin-top:8px">Fluent Steps is optional, so what matters most is <b>how often the child takes part</b> and the conversational confidence noted in the comments below.</p>':''}</div>
  <div class="card"><h3>📝 Recent observations</h3>
   ${recent.length?`<ul style="margin:0 0 0 18px">${recent.map(o=>`<li class="small" style="margin-bottom:6px"><b>${esc(o.date||'')}:</b> ${esc(o.obs)}</li>`).join('')}</ul>`:'<p class="muted small">No written observations yet.</p>'}
   <button class="btn ghost sm" style="margin-top:10px" onclick="openStudent('${cid}','${esc(name).replace(/'/g,"\\'")}','history')">📜 See full history →</button>
  </div>
  ${(()=>{const ps=[];sessionsOf(cid).forEach(s=>{const r=(s.rows||{})[name];if(r&&(r.personalized||s.personalized))ps.push({s,r});});if(!ps.length)return '';return `<div class="card" style="border-color:#1B7A3A;background:linear-gradient(120deg,#EEF8F0,#FFFEF9)"><h3>📗 Personalized lessons</h3><p class="hint">Exclusive / reinforcement lessons logged for this child, including book work pulled from another class.</p>${ps.slice().reverse().map(({s,r})=>`<div class="actrow" style="display:block"><div><b>${esc(s.date||'')}</b> ${r.bookName?`· <span class="badge b-na">📖 ${esc(r.bookName)} book</span>`:''} <span class="badge ${r.att==='Present'?'b-present':(r.att==='Absent'?'b-absent':'b-late')}">${esc(r.att||'')}</span></div><div class="small" style="margin-top:4px">${esc(r.obs||'')}</div>${(r.skills&&Object.keys(r.skills).length)?`<div class="small" style="margin-top:5px"><b>${esc(r.bookLevel||'')} skills:</b> ${Object.keys(r.skills).map(k=>`<span class="chip ${ratingClass(r.skills[k])}">${esc(k)}: ${esc(r.skills[k])}</span>`).join(' ')}</div>`:''}</div>`).join('')}</div>`;})()}
  ${(()=>{const acts=studentActions(cid,name);if(!acts.length)return '';return `<div class="card"><h3>🚦 Action follow-ups</h3><p class="hint">Attention points logged by the teacher and the coordination's guidance — kept in this child's record.</p>${acts.map(a=>`<div class="actrow ${a.done?'done':''}" style="display:block"><div><b>${esc(a.solution||a.point||'')}</b> <span class="muted small">${esc(a.date||'')}</span> ${a.done?'<span class="badge b-present">resolved</span>':'<span class="badge b-late">open</span>'}</div>${a.point?`<div class="small muted">Point: ${esc(a.point)}</div>`:''}${actionThreadHtml(cid,a)}</div>`).join('')}</div>`;})()}
  ${pedagogicalOrientationCard(cid,name)}`;
 // charts
 setTimeout(()=>{if(!window.Chart)return;
  const dough=(id,labels,data,colors)=>{const el=$("#"+id);if(!el)return;new Chart(el,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}}}}});};
  dough('cAtt',['Present','Late','Absent'],[st.p,st.l,st.a],['#4FB62B','#FF914D','#E23B3B']);
  if(c.fluent){const el=$("#cPart");if(el){const by={};rows.forEach(r=>{if(r.date&&(r.att==='Present'||r.att==='Late'||!r.att&&r.obs)){const m=r.date.slice(0,7);by[m]=(by[m]||0)+1;}});const ks=Object.keys(by).sort();new Chart(el,{type:'bar',data:{labels:ks,datasets:[{label:'Classes',data:ks.map(k=>by[k]),backgroundColor:'#EC407A',borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}});}}
  else dough('cHw',['Done',"Didn't",'None'],[st.hd,st.hm,noneHw],['#4FB62B','#E23B3B','#90A4AE']);
  if(tests.length){const el=$("#cTest");if(el)new Chart(el,{type:'bar',data:{labels:tests.map(t=>(c.mock?'Mock ':'Unit ')+t.u),datasets:[{label:'Score',data:tests.map(t=>t.score),backgroundColor:'#2C6FB0',borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});}
  if(c.kidDollar){const el=$("#cDol");if(el){let cum=0;const pts=rows.filter(r=>r.date).map(r=>{cum+=Number(r.dollar)||0;return {x:r.date,y:cum};});new Chart(el,{type:'line',data:{labels:pts.map(p=>p.x),datasets:[{label:'$',data:pts.map(p=>p.y),borderColor:'#800080',backgroundColor:'rgba(128,0,128,.12)',fill:true,tension:.3,pointRadius:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});}}
 },40);
}

function studentHistory(cid,name){
 const c=getClass(cid);const rows=studentRows(cid,name);const tests=studentTests(cid,name);
 const note=STATE.notes[cid+'::'+name]||STATE.notes[cid+'::'+name];
 // build a unified timeline of everything written
 const items=[];
 rows.forEach(r=>{if(r.obs||r.att||r.hw||r.dollar||r.phon)items.push({date:r.date||'',type:'class',theme:r.theme,att:r.att,hw:r.hw,dollar:r.dollar,obs:r.obs,phon:r.phon});});
 tests.forEach(t=>{items.push({date:t.date||'',type:'test',u:t.u,score:t.score,level:t.level,obs:t.feedback});});
 coordNotesOf(cid,name).forEach(o=>{items.push({date:(o.ts||'').slice(0,10),type:'coordnote',obs:o.text});});
 studentActions(cid,name).forEach(a=>{items.push({date:a.date||'',type:'action',obs:a.solution,point:a.point,due:a.due,done:a.done,doneDate:a.doneDate});});
 items.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
 const written=rows.filter(r=>r.obs).length+tests.filter(t=>t.feedback).length;
 const body=items.length?items.map(it=>{
   if(it.type==='action')return `<div class="comp" style="border-color:#C9A24B;background:#FBF4E2"><h5>📌 Action plan ${it.date?'· '+esc(it.date):''}${it.done?' <span class="badge b-present">resolved</span>':(it.due&&dueLate(it.due)?' <span class="badge b-absent">overdue</span>':' <span class="badge b-late">open</span>')}</h5><div class="small">${esc(it.obs)}${it.point?`<br><span class="muted">For: ${esc(it.point)}</span>`:''}${it.due?`<br><span class="muted">Deadline: ${esc(it.due)}</span>`:''}</div></div>`;
   if(it.type==='coordnote')return `<div class="comp" style="border-color:var(--purple);background:#F3E6F3"><h5>🗒️ Coordination note ${it.date?'· '+esc(it.date):''}</h5><div class="small">${esc(it.obs)}</div></div>`;
   if(it.type==='test')return `<div class="comp" style="border-color:#2C6FB0;background:#E7EEF6"><h5>🧪 ${esc(c.mock?'Mock Test':'Unit Test')} ${esc(it.u)} ${it.date?'· '+esc(it.date):''} ${it.score!=null?`<span class="badge ${(t=>t===2?'b-present':t===1?'b-late':'b-absent')(testTier(it.score,c))}">${esc(it.score)}</span>`:''} <span class="muted small">${esc(it.level||'')}</span></h5>${it.obs?`<div class="small">${esc(it.obs)}</div>`:''}</div>`;
   const badges=`${it.att?`<span class="badge ${it.att==='Present'?'b-present':it.att==='Absent'?'b-absent':'b-late'}">${esc(it.att)}</span> `:''}${it.hw?`<span class="badge ${it.hw==='Done'?'b-prof':it.hw==='Didn\'t do'?'b-absent':'b-na'}">HW: ${esc(it.hw)}</span> `:''}${(it.phon&&it.phon.indexOf('—')!==0)?`<span class="badge ${it.phon.indexOf('Secure')===0?'b-prof':it.phon.indexOf('Blends')===0?'b-dev':'b-late'}">🔡 ${esc(it.phon)}</span> `:''}${it.dollar?`<span class="badge b-na">$${esc(it.dollar)}</span>`:''}`;
   return `<div class="comp"><h5>📅 ${esc(it.date||'—')} ${it.theme?'· '+esc(it.theme):''}</h5><div style="margin-bottom:4px">${badges}</div>${it.obs?`<div class="small">${esc(it.obs)}</div>`:'<div class="small muted">No written comment.</div>'}</div>`;
 }).join('') : '<p class="muted small">Nothing recorded yet.</p>';
 return `
  <div class="card"><h3>📜 Everything written about ${esc(displayName(cid,name))}</h3>
   <p class="hint">${items.length} entries · ${written} written comments · full chronological record (most recent first).</p>
   ${note?`<div class="flag ok"><span class="fi">💬</span><div><b>Coordination note:</b> ${esc(note)}</div></div>`:''}
   ${body}</div>`;
}
