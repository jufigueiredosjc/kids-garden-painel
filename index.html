<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Garden · Pedagogical Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --green:#4FB62B; --green-d:#3C9020; --green-bright:#77f748;
  --orange:#FF914D; --orange-d:#EF7A2E;
  --purple:#800080; --purple-d:#5E005E;
  --ink:#042342; --navy:#042342;
  --muted:#67788A; --bg:#F4FAF0; --card:#FFFFFF; --line:#E5EEDD; --soft:#EDF7E4;
  --ok:#4FB62B; --warn:#FF914D; --bad:#E23B3B; --shadow:0 6px 22px rgba(4,35,66,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',-apple-system,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px}
.hidden{display:none!important}
/* ---------- top bar ---------- */
.topbar{background:linear-gradient(120deg,#042342,#0a4a4a 60%,#2E7D32);color:#fff;padding:12px 22px;display:flex;align-items:center;gap:16px;box-shadow:var(--shadow);position:sticky;top:0;z-index:50}
.wordmark{display:flex;flex-direction:column;line-height:.92;font-weight:900;font-style:italic;letter-spacing:.5px}
.wordmark .l1{font-size:26px}
.wordmark .l1 .k{color:#FF914D;-webkit-text-stroke:1px #fff;text-shadow:1px 1px 0 rgba(0,0,0,.15)}
.wordmark .l1 .g{color:#77f748;-webkit-text-stroke:1px #fff;text-shadow:1px 1px 0 rgba(0,0,0,.15)}
.wordmark .l2{font-size:9px;font-style:normal;font-weight:700;letter-spacing:4px;color:#cfe8d6;margin-top:2px}
.logo-img{height:46px;width:auto;display:block;flex:none}
.logo-img.report{height:56px}
.topbar .spacer{flex:1}
.tb-btn{background:rgba(255,255,255,.16);color:#fff;padding:9px 15px;border-radius:11px;font-weight:700;font-size:13px;display:flex;align-items:center;gap:7px;transition:.15s}
.tb-btn:hover{background:rgba(255,255,255,.30)}
.phsk-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:5px}
.phsk{display:inline-flex;align-items:center;gap:3px;font-size:12px;cursor:pointer;user-select:none;background:var(--soft);border:1px solid var(--line);padding:2px 7px;border-radius:8px;white-space:nowrap}
.phsk input{cursor:pointer;margin:0}
.phchips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.phchip{display:inline-flex;align-items:center;gap:5px;background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:5px 9px;font-size:13px}
.phbadge{display:inline-flex;min-width:20px;height:20px;align-items:center;justify-content:center;border-radius:6px;color:#fff;font-size:12px;padding:0 4px}
.phsktiny{font-size:12px;letter-spacing:1px}
.wrap{max-width:1180px;margin:0 auto;padding:26px 20px 70px}
/* ---------- home ---------- */
.hero{background:var(--card);border-radius:22px;padding:24px 28px;box-shadow:var(--shadow);margin-bottom:10px;border:1px solid var(--line);display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.hero .big{font-size:42px}
.hero h2{font-size:22px;color:var(--navy)}
.hero p{color:var(--muted);font-size:14px;max-width:660px}
.section-title{display:flex;align-items:center;gap:10px;margin:26px 4px 14px;font-size:15px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.6px}
.section-title small{font-size:12px;font-weight:600;text-transform:none;letter-spacing:0;color:var(--muted)}
.grid{display:grid;gap:14px}
.classes-grid{grid-template-columns:repeat(auto-fill,minmax(235px,1fr))}
.class-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:var(--shadow);text-align:left;transition:.15s;position:relative;overflow:hidden}
.class-card:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(4,35,66,.16)}
.class-card .bar{position:absolute;top:0;left:0;right:0;height:6px}
.class-card .lvl{display:inline-block;font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;color:#fff;margin-bottom:8px}
.class-card h3{font-size:16px;margin-bottom:3px;color:var(--navy)}
.class-card .meta{font-size:12.5px;color:var(--muted)}
.class-card .foot{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--soft);color:var(--green-d)}
.pill.warn{background:#FFEAD9;color:#B5611C}
.pill.bad{background:#FBE2E2;color:#B5292B}
.pill.ok{background:#E3F6D9;color:var(--green-d)}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.feature-grid{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
.feature{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--shadow);text-align:left;transition:.15s}
.feature:hover{transform:translateY(-3px)}
.feature .ico{width:50px;height:50px;border-radius:14px;display:grid;place-items:center;font-size:26px;margin-bottom:12px}
.feature h3{font-size:17px;margin-bottom:5px;color:var(--navy)}
.feature p{font-size:13px;color:var(--muted)}
/* ---------- generic ---------- */
.page-head{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.back{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px 14px;font-weight:700;font-size:13px;color:var(--ink);display:flex;align-items:center;gap:6px;box-shadow:var(--shadow)}
.back:hover{background:var(--soft)}
.page-head h2{font-size:24px;color:var(--navy)}
.page-head .sub{color:var(--muted);font-size:13px}
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;border-bottom:2px solid var(--line)}
.tab{padding:10px 16px;font-weight:700;font-size:14px;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;transition:.15s}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--green-d);border-color:var(--green)}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--shadow);margin-bottom:18px}
.card h3{font-size:16px;margin-bottom:4px;display:flex;align-items:center;gap:8px;color:var(--navy)}
.card .hint{font-size:12.5px;color:var(--muted);margin-bottom:14px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.stat{background:var(--soft);border-radius:14px;padding:14px 16px}
.stat .n{font-size:26px;font-weight:800;color:var(--green-d)}
.stat .l{font-size:12px;color:var(--muted);font-weight:600}
.stat.blue{background:#E7EEF6}.stat.blue .n{color:var(--navy)}
.stat.orange{background:#FFEFE2}.stat.orange .n{color:var(--orange-d)}
.stat.purple{background:#F3E6F3}.stat.purple .n{color:var(--purple)}
.stat.bad{background:#FCE7E7}.stat.bad .n{color:var(--bad)}
label.fl{display:block;font-size:12.5px;font-weight:700;color:var(--ink);margin:0 0 5px}
.inp,select.inp,textarea.inp{width:100%;padding:9px 12px;border:1.5px solid var(--line);border-radius:11px;background:#fff;color:var(--ink)}
.inp:focus{outline:none;border-color:var(--green)}
textarea.inp{resize:vertical;min-height:64px}
.row{display:grid;gap:12px;margin-bottom:12px}
.row.c2{grid-template-columns:1fr 1fr}.row.c3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:680px){.row.c2,.row.c3{grid-template-columns:1fr}}
.btn{background:var(--green);color:#fff;font-weight:800;padding:11px 20px;border-radius:12px;font-size:14px;box-shadow:var(--shadow);transition:.15s;display:inline-flex;align-items:center;gap:7px}
.btn:hover{background:var(--green-d)}
.btn.ghost{background:var(--card);color:var(--ink);border:1.5px solid var(--line);box-shadow:none}
.btn.ghost:hover{background:var(--soft)}
.btn.orange{background:var(--orange)}.btn.orange:hover{background:var(--orange-d)}
.btn.navy{background:var(--navy)}.btn.navy:hover{filter:brightness(1.25)}
.btn.sm{padding:7px 13px;font-size:12.5px}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line)}
th{font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:800}
tr:last-child td{border-bottom:none}
.tbl-wrap{overflow-x:auto}
.att-sel{padding:5px 8px;border-radius:8px;border:1.5px solid var(--line);font-size:12.5px;font-weight:700}
.badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;display:inline-block;white-space:nowrap}
.b-present{background:#E3F6D9;color:var(--green-d)}.b-absent{background:#FBE2E2;color:#B5292B}.b-late{background:#FFEAD9;color:#B5611C}
.b-prof{background:#E3F6D9;color:var(--green-d)}.b-dev{background:#FFEAD9;color:#B5611C}.b-na{background:#EEF2F4;color:#90A4AE}
.flag{display:flex;align-items:flex-start;gap:11px;padding:12px 14px;border-radius:13px;margin-bottom:10px;font-size:13.5px}
.flag .fi{font-size:20px;line-height:1}
.flag.bad{background:#FCEAEA;border:1px solid #F3C7C7}
.flag.warn{background:#FFF1E5;border:1px solid #FAD6B6}
.flag.ok{background:#EAF8E0;border:1px solid #C6E9B0}
.flag.money{background:#E1F7E8;border:1px solid #57B97A;border-left:6px solid #1FA85A}
.acts{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.actrow{display:flex;align-items:flex-start;gap:8px;background:#fff;border:1px solid #E6D6B8;border-radius:9px;padding:7px 9px;font-size:12.5px}
.actrow.done{opacity:.62}
.actrow .fi2{font-size:15px;line-height:1.2}
.stat.green{background:#E1F7E8}.stat.green .n{color:#1FA85A}
.flag b{font-weight:800}
.tip{background:linear-gradient(120deg,#fff,var(--soft));border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:var(--shadow)}
.tip .e{font-size:30px}.tip h4{font-size:15px;margin:6px 0 4px;color:var(--navy)}.tip p{font-size:13px;color:var(--muted)}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.chip{font-size:12px;font-weight:700;background:var(--soft);color:var(--green-d);padding:5px 11px;border-radius:20px;display:inline-block;white-space:nowrap}
.chip.bad{background:#FBE2E2;color:#B5292B}
.comp{border-left:4px solid var(--green);background:var(--soft);border-radius:0 12px 12px 0;padding:11px 14px;margin-bottom:10px}
.comp h5{font-size:13.5px;color:var(--navy);margin-bottom:5px}
.comp ul{margin:0 0 0 16px}.comp li{font-size:12.5px;color:#33515f;margin-bottom:2px}
.acc{border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden;background:#fff}
.acc-h{padding:13px 16px;font-weight:800;font-size:14px;display:flex;align-items:center;gap:10px;cursor:pointer;color:var(--navy)}
.acc-h .ar{margin-left:auto;transition:.2s;color:var(--muted)}
.acc.open .ar{transform:rotate(90deg)}
.acc-b{padding:0 16px;max-height:0;overflow:hidden;transition:max-height .25s}
.acc.open .acc-b{max-height:3000px;padding-bottom:16px}
.unit-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.unit-tab{padding:7px 13px;border-radius:10px;font-weight:800;font-size:12.5px;background:var(--soft);color:var(--green-d);border:1.5px solid transparent}
.unit-tab.active{background:var(--green);color:#fff}
.unit-tab.done{border-color:var(--green)}
.lock{max-width:380px;margin:60px auto;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:32px;box-shadow:var(--shadow);text-align:center}
.lock .e{font-size:46px}.lock h2{margin:10px 0 4px;color:var(--navy)}.lock p{color:var(--muted);font-size:13px;margin-bottom:18px}
.od-overlay{position:fixed;inset:0;background:rgba(160,15,15,.5);display:grid;place-items:center;z-index:300;padding:16px}
.od-box{background:#fff;border:4px solid var(--bad);border-radius:20px;padding:24px 28px;max-width:440px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.35);animation:odpulse 1.1s ease-in-out infinite}
.od-box .od-ico{font-size:48px}
.od-box h2{color:var(--bad);font-size:23px;margin:4px 0 8px}
.od-box p{font-size:14px;margin-bottom:7px;color:var(--ink)}
.od-box .od-sub{color:var(--muted)}
@keyframes odpulse{0%{box-shadow:0 0 0 0 rgba(226,59,59,.45)}70%{box-shadow:0 0 0 18px rgba(226,59,59,0)}100%{box-shadow:0 0 0 0 rgba(226,59,59,0)}}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 22px;border-radius:14px;font-weight:700;font-size:14px;box-shadow:var(--shadow);z-index:200;opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1;bottom:34px}
.narr{background:linear-gradient(120deg,#F3E6F3,#EDF7E4);border:1px solid var(--line);border-radius:14px;padding:16px 18px;font-size:14px;line-height:1.65;color:#2b3f4d}
.muted{color:var(--muted)}.small{font-size:12px}.center{text-align:center}
hr.sep{border:none;border-top:1px solid var(--line);margin:16px 0}
.rpt-runhead{display:none}.rpt-block{width:100%;border-collapse:collapse}.rpt-block>tbody>tr>td,.rpt-block>thead>tr>td{padding:0}
@media print{@page{size:A4;margin:12mm}.topbar,.tabs,.no-print,.back{display:none!important}.wrap{padding:0}.card{box-shadow:none;border:1px solid #ccc}.rpt-block+.rpt-block{break-before:page;page-break-before:always}.rpt-block thead{display:table-header-group}.rpt-runhead{display:block;font-size:10px;color:#042342;font-weight:800;border-bottom:1px solid #bbb;padding:0 0 3px;margin-bottom:6px}.rpt-card{break-inside:auto}h3{break-after:avoid}.stat-grid,.tbl-wrap,.narr,.comp,.flag{break-inside:avoid;page-break-inside:avoid}}
</style>
</head>

const CAMB_MARKS={Starters:{"Listening":20,"Reading & Writing":25},Movers:{"Listening":25,"Reading & Writing":40},Flyers:{"Listening":25,"Reading & Writing":50},B1:{"Reading":32,"Listening":25}};
function cambMax(lvl,paper){return ((CAMB_MARKS[lvl]||{})[paper])||null;}
function cambIsSpeaking(p){return /speaking/i.test(p||'');}
/* B1 Writing has no number: the teacher writes a comment and the band is estimated from it,
   following B1 Preliminary for Schools Writing criteria (Content, Communicative Achievement, Organisation, Language).
   This is an AI-assisted heuristic estimate — it supports, never replaces, the teacher's judgement. */
function cambIsWritingEstimate(lvl,p){return lvl==='B1'&&/^\s*writing\s*$/i.test(p||'');}
function estimateWritingBand(text){var t=(text||'').toLowerCase();if(!t.trim())return null;
 var pos=['excellent','great','very good','clear','well organi','well-structured','well structured','good range','wide range','accurate','appropriate','fluent','coherent','cohesive','relevant','completed the task','finished the task','good vocab','rich vocab','connectives','linkers','correct structure','organi','strong','confident','on topic','on-topic','good control','few errors','minor errors','natural','creative','impressive'];
 var neg=['error','struggl','incomplete','did not finish','did not complete','could not finish','unclear','limited','very basic','basic','mistake','difficulty','could not','off-topic','off topic','irrelevant','too short','ran out of time','run out of time','disorgani','repetitive','confus','poor','weak','many errors','lacks','missing','needs to improve','needs work','below'];
 var score=68;pos.forEach(function(w){if(t.indexOf(w)>=0)score+=4;});neg.forEach(function(w){if(t.indexOf(w)>=0)score-=6;});
 return Math.max(20,Math.min(98,Math.round(score)));}
function cambPaperPct(lvl,paper,val){if(cambIsSpeaking(paper))return null;if(cambIsWritingEstimate(lvl,paper))return (val&&String(val).trim())?estimateWritingBand(val):null;if(val===''||val==null)return null;var n=Number(val);if(isNaN(n))return null;var mx=cambMax(lvl,paper);return mx?Math.round(n/mx*100):Math.round(n);}

/* Cross-program enrollment: a child can be in a regular class AND in Fluent Steps / Cambridge.
   We link records across classes by their full display name (safe — same child = same full name). */
function classMemberNames(c){if(!c)return [];var names={};
 try{(activeStudents(c)||[]).forEach(function(n){names[n]=1;});}catch(e){}
 (((STATE.addedStudents||{})[c.id])||[]).forEach(function(n){names[n]=1;});
 if(c.id==='fluent_steps'){var fr=(STATE.fluent||{}).roster||{};Object.keys(fr).forEach(function(sl){(fr[sl]||[]).forEach(function(n){names[n]=1;});});}
 if(c.id==='cambridge_prep'){var cr=(STATE.camb||{}).roster||{};Object.keys(cr).forEach(function(lv){(cr[lv]||[]).forEach(function(n){names[n]=1;});});}
 var out=[];Object.keys(names).forEach(function(n){if(!isArchived(c.id,n))out.push(n);});return out;}

function bdayDaysAway(dob){if(!dob)return null;const t=new Date();const today=new Date(t.getFullYear(),t.getMonth(),t.getDate());const p=dob.split('-');if(p.length!==3)return null;let n=new Date(today.getFullYear(),Number(p[1])-1,Number(p[2]));if(n<today)n=new Date(today.getFullYear()+1,Number(p[1])-1,Number(p[2]));return Math.round((n-today)/864e5);}
function ageTurning(dob){if(!dob)return null;const p=dob.split('-');if(p.length!==3)return null;const t=new Date();let yr=t.getFullYear();const bd=new Date(yr,Number(p[1])-1,Number(p[2]));if(bd<new Date(t.getFullYear(),t.getMonth(),t.getDate()))yr++;return yr-Number(p[0]);}

pecific information about daily routines and times (o'clock)."],"Speaking":["Introduce oneself and respond appropriately to social expressions. (e.g. “Nice to meet you. I'm fine, thank you.”)","Describe what someone is doing using the present continuous accurately.","Ask and answer questions about routines using the present simple and time expressions.","Describe differences between two pictures using short, structured responses (Movers Speaking Part 1)."],"Reading":["Read and understand short personal descriptions and identify key details.","Demonstrate comprehension of a poem by identifying emotions and actions. (e.g. Identify why a character feels “sad.”)","Read for specific information related to daily routines and environmental care.","Recognise and interpret present simple and present continuous structures in context."],"Writing":["Write short personal descriptions using adjectives and “have got”.","Write sentences describing actions using the present continuous accurately.","Produce short written responses about daily routines including time references.","Write simple sentences about caring for the planet using target vocabulary (recycle, save water, turn off)."],"Use of English":["Apply present continuous forms correctly in affirmative, negative, and interrogative structures. (e.g. “Are they playing football? No, they aren't.”)","Use present simple accurately when describing daily routines with time markers.","Demonstrate control of third person singular forms in routine descriptions (finishes, goes).","Use functional environmental vocabulary appropriately within controlled practice."]},"2":{"Listening":["Understand days of the week and identify activities in context. (e.g. “I play football on Monday.”)","Recognise questions with How often and adverbs of frequency. (e.g. “I always do my homework.”)","Follow conversations about routines and free time activities. (e.g. “She sometimes watches films.”)","Understand basic rules and safety instructions. (e.g. “You must wear a helmet.”)"],"Speaking":["Talk about days of the week and weekly routines. (e.g. “I swim on Saturdays.”)","Ask and answer questions using How often. (e.g. “How often do you play? I often play.”)","Describe habits using adverbs of frequency. (e.g. “I never play video games at night.”)","Give rules and advice using must and mustn't. (e.g. “You must drink water.”)"],"Reading":["Recognise and understand vocabulary related to routines and activities. (e.g. “Find ‘play basketball’.”)","Identify frequency expressions in short texts. (e.g. “He always runs.”)","Read and understand simple rules and instructions. (e.g. “You must wear gloves.”)","Understand key ideas in an infographic about safety. (e.g. “Drink water before exercise.”)"],"Writing":["Write simple sentences about routines and activities. (e.g. “I play on Mondays.”)","Complete sentences using adverbs of frequency. (e.g. “I sometimes go skating.”)","Write rules using must and mustn't. (e.g. “You mustn't run in the street.”)","Describe actions and consequences in simple sentences. (e.g. “Run → get hot.”)"],"Use of English":["Use How often and adverbs of frequency correctly. (e.g. “How often do you swim? I swim twice a week.”)","Use present simple to describe routines. (e.g. “I play football every day.”)","Use must and mustn't to express rules and obligation. (e.g. “You must wear a helmet.”)","Use sequencing and time expressions (before/after, weekend). (e.g. “I play after school.”)"]},"3":{"Listening":["Recognise and identify vocabulary related to jobs, parties, and physical descriptions in conversations, songs, and stories. (e.g. “She is a doctor.”)","Distinguish between the present simple and the present continuous when listening to short dialogues. (e.g. “He works at a hospital. He is working now.”)","Understand questions and answers with Why ... ? and Because .... (e.g. “Why is she laughing? Because she is happy.”)","Identify key information about people who help in the community. (e.g. “A firefighter works at the fire station.”)"],"Speaking":["Talk about jobs and costume parties using complete sentences. (e.g. “He is dressed as a pirate.”)","Describe people's physical appearance using adjectives and has got. (e.g. “She has got curly blonde hair.”)","Ask and answer questions using Why ... ? and Because .... (e.g. “Why are you wearing a costume? Because it is a party.”)","Describe routines and actions happening now using the present simple and present continuous. (e.g. “My mother works in a hospital. She is working today.”)"],"Reading":["Read and recognise words related to jobs, parties, and appearance accurately. (e.g. “dentist”)","Read short texts and identify whether actions are routines or happening now. (e.g. “He usually cooks. He is cooking now.”)","Read stories and understand how characters ask for and offer help. (e.g. “What about making a cake?”)","Read informational texts about community helpers and locate specific details. (e.g. “Police officers work at the police station.”)"],"Writing":["Write the names of jobs and physical descriptions correctly. (e.g. “firefighter”)","Write sentences using the present simple and present continuous. (e.g. “She always sings at parties. She is singing now.”)","Write answers to questions with Why ... ? and Because .... (e.g. “Because I like helping people.”)","Write short descriptions and simple story continuations. (e.g. “The tall clown is wearing a red costume.”)"],"Use of English":["Use the present simple to describe routines and jobs. (e.g. “He works at a restaurant.”)","Use the present continuous to describe actions happening now. (e.g. “They are making a cake.”)","Form and answer questions with Why ... ? and Because .... (e.g. “Why is he dressed as a pirate? Because it is a costume party.”)","Use adjectives and has got to describe people accurately. (e.g. “She has got straight fair hair.”)"]}}},"K4":{"skillset":["Listening","Speaking","Reading","Writing","Use of English"],"units":{"1":{"Listening":["Identify greetings and introductions in contextualised dialogues.","Recognise specific time expressions (o'clock, half past, midday, midnight) in spoken input. (Expected example: Identifies correctly: “It's half past three.”)","Identify present simple question forms and question words in context.","Understand references to past abilities using could and couldn't in short listening tasks."],"Speaking":["Greet others and introduce people using appropriate structures. (Expected example: “This is my friend. Nice to meet you.”)","Ask and answer present simple questions using a range of question words.","Describe past abilities using could and couldn't with time reference.","Compare aspects of a circus child's life with their own using simple structured responses."],"Reading":["Extract specific factual information from a reading text about circus life.","Identify key details in an interview and demonstrate understanding of vocabulary in context. (Expected example: Identify what the child does every morning.)","Interpret information about abilities and routines expressed in different tenses.","Demonstrate comprehension of a factual text in exam-style Reading and Writing tasks."],"Writing":["Write sentences describing people using have got and descriptive language. (Expected example: “She's got purple hair.”)","Write questions in the present simple using appropriate question words.","Produce short paragraphs describing past abilities using could/couldn't.","Write brief comparisons between their own life and a circus child's routine."],"Use of English":["Apply present simple question formation accurately (word order and auxiliary use). (Expected example: “What time do you wake up?”)","Demonstrate control of time expressions when describing routines.","Use action verbs accurately in affirmative and negative sentences.","Form and use could and couldn't correctly to describe past abilities."]},"2":{"Listening":["Understand and identify food and drink vocabulary in context. (Example: “Would you like some tea?”)","Recognise relative clauses in simple spoken sentences. (Example: “This is the café where we eat.”)","Identify key information in past events using irregular verbs. (Example: “He went to the museum.”)","Listen for specific details in stories and factual texts. (Example: “The fish swam up the waterfall.”)"],"Speaking":["Talk about food and offer or request items politely. (Example: “Would you like some noodles?”)","Use relative clauses to describe people, places and things. (Example: “This is the man who cooked.”)","Describe past events using irregular verbs. (Example: “I ate pancakes yesterday.”)","Connect past events using when. (Example: “I was eating when he arrived.”)"],"Reading":["Recognise and understand food vocabulary in texts. (Example: “Find ‘strawberries’.”)","Identify relative clauses in written sentences. (Example: “This is the place where we had lunch.”)","Understand key ideas about healthy eating and food groups. (Example: “Vegetables are healthy.”)","Read and interpret the message of a traditional story. (Example: “The story teaches perseverance.”)"],"Writing":["Write simple sentences about food preferences. (Example: “I like yoghurt.”)","Use relative clauses in short written descriptions. (Example: “This is the restaurant where we eat.”)","Write sentences using irregular past simple verbs. (Example: “She drank milk.”)","Describe events using when to connect ideas. (Example: “I was eating when the phone rang.”)"],"Use of English":["Use polite structures for offering and requesting food. (Example: “Can I have a milkshake, please?”)","Use relative clauses with who, which, where accurately. (Example: “This is the food which I like.”)","Use irregular past simple verbs correctly. (Example: “He went to the café.”)","Use when to form complex past sentences. (Example: “When I finished, I went home.”)"]},"3":{"Listening":["Recognise and identify vocabulary related to parts of the body and health problems in songs, dialogues, and classroom conversations. (Example: “My knee hurts.”)","Distinguish comparative and superlative adjectives in short oral texts. (Example: “Tom is taller than Ben.”)","Understand advice using need to and intentions using want to. (Example: “You need to rest.”)","Identify key information in short texts about bones, joints, and healthy habits. (Example: “Bones help your body move.”)"],"Speaking":["Name parts of the body and describe common health problems using complete sentences. (Example: “I've got a sore throat.”)","Compare people and objects using comparative, superlative, and as … as. (Example: “My brother is stronger than me.”)","Express wants and intentions using want to. (Example: “I want to play football.”)","Give simple health advice using need to. (Example: “You need to drink water.”)"],"Reading":["Read and recognise vocabulary related to health and the body accurately. (Example: “shoulder”)","Read short texts and identify comparisons and health advice. (Example: “The elephant is bigger than the lion.”)","Read informational texts about bones, joints, and yoga. (Example: “Joints connect bones.”)","Read stories and play scripts and identify the main idea and specific details. (Example: “The mouse deer tricked the other animals.”)"],"Writing":["Write the names of body parts and health problems correctly. (Example: “stomach-ache”)","Write sentences using comparative and superlative adjectives. (Example: “Anna is the tallest girl in the class.”)","Write sentences with want to and need to. (Example: “I want to go outside, but I need to rest.”)","Write short health plans and simple responses to reading tasks. (Example: “I need to eat healthy food and do exercise.”)"],"Use of English":["Use comparative and superlative adjectives accurately. (Example: “This exercise is easier than that one.”)","Use as … as to compare two things. (Example: “My sister is as tall as me.”)","Use want to to express desires and plans. (Example: “I want to feel better.”)","Use need to to give advice and talk about necessity. (Example: “You need to stay at home.”)"]}}},"K5":{"skillset":["Listening","Speaking","Reading","Writing","Use of English"],"units":{"1":{"Listening":["Identify specific information about dates and months in contextualised dialogues. (Expected example: Recognises: “It's the fifth of October.”)","Understand speculation using may and might in short listening tasks.","Identify key details about journeys and transport vocabulary in spoken texts.","Recognise references to climate zones and weather descriptions in informational listening."],"Speaking":["Ask and answer questions about dates using ordinal numbers accurately. (Expected example: “What's the date today? It's the twenty-first of March.”)","Use may and might to speculate about future events or weather.","Describe journeys using appropriate transport and location vocabulary.","Express personal opinions when comparing climates or planning a trip."],"Reading":["Extract specific factual information from texts about climates and climate zones.","Demonstrate comprehension of an informational text about life in the Arabian Desert. (Expected example: Identify how people keep cool in the desert.)","Read and interpret a children's encyclopedia entry, identifying key biographical details.","Complete a continuous dialogue using contextual clues (Reading & Writing exam skill)."],"Writing":["Write dates accurately using ordinal numbers and correct format. (Expected example: “My birthday is on the third of July.”)","Produce sentences using may and might to express possibility.","Write short descriptive paragraphs about climates or journeys using appropriate vocabulary.","Write structured responses summarising information from an encyclopedia text."],"Use of English":["Demonstrate control of ordinal numbers and date formation in written and oral tasks.","Apply may and might accurately to express future possibility. (Expected example: “It might be cold.”)","Use indefinite pronouns correctly in affirmative and negative contexts (someone, anything, nowhere).","Demonstrate accurate use of comparative and superlative forms when describing climates."]},"2":{"Listening":["Understand and identify vocabulary related to the natural world and animals. (Example: “The camel lives in the desert.”)","Recognise past simple forms (regular and irregular) in context. (Example: “They went to the forest.”)","Understand sentences using too and enough. (Example: “There are too many cars.”)","Listen for specific details about animals and environmental issues. (Example: “The rhino is endangered.”)"],"Speaking":["Talk about nature, places and animals using simple sentences. (Example: “The ocean is very big.”)","Describe past events using past simple and ago. (Example: “We visited the cave two days ago.”)","Express problems and quantities using too and enough. (Example: “There isn't enough water.”)","Talk about animals and environmental awareness. (Example: “We must protect animals.”)"],"Reading":["Recognise and understand vocabulary related to nature and animals. (Example: “Find the word ‘desert’.”)","Identify past simple forms and time expressions in texts. (Example: “They arrived three days ago.”)","Understand key ideas about endangered animals and habitats. (Example: “The gorilla lives in forests.”)","Read and interpret poems, identifying feelings and messages. (Example: “The poem shows care for the Earth.”)"],"Writing":["Write simple sentences about nature and animals. (Example: “The eagle can fly.”)","Write sentences using past simple and ago. (Example: “We saw a snake one week ago.”)","Use too and enough in short written sentences. (Example: “The air isn't clean enough.”)","Describe ideas from a poem or environmental topic. (Example: “We must take care of the Earth.”)"],"Use of English":["Use past simple (regular and irregular verbs) correctly. (Example: “They found a cave.”)","Use ago to describe past time. (Example: “He left two hours ago.”)","Use too and enough with nouns and adjectives. (Example: “It's too hot.”)","Use environmental and animal vocabulary accurately in context. (Example: “This animal is endangered.”)"]},"3":{"Listening":["Recognise and identify vocabulary related to competitions, music, and festivals in songs, dialogues, and interviews. (Example: “The team won the match.”)","Understand the present perfect when listening to people talking about experiences. (Example: “Have you ever danced samba?”)","Distinguish the meaning of just, already, and yet in short conversations. (Example: “I've just finished my homework.”)","Identify specific details in listening tasks about music, travel, and personal experiences. (Example: “She has already been to Brazil.”)"],"Speaking":["Talk about competitions, musical events, and festivals using complete sentences. (Example: “My team has won a prize.”)","Ask and answer questions about life experiences using the present perfect. (Example: “Have you ever played the violin?”)","Use just, already, and yet to describe recent actions and unfinished experiences. (Example: “I've already seen the parade.”)","Discuss perseverance and personal achievements. (Example: “He has worked hard since he was a child.”)"],"Reading":["Read and recognise vocabulary related to competitions, music, and festivals accurately. (Example: “Instrument”)","Read informational texts about the history of musical instruments and Brazilian carnival music. (Example: “The lute is an ancient instrument.”)","Read stories and identify key details about resilience and perseverance. (Example: “The football player has never given up.”)","Read exam-style texts and locate specific information and main ideas. (Example: “She has just won the race.”)"],"Writing":["Write the names of competitions, instruments, and festivals correctly. (Example: “volleyball”)","Write sentences and questions using the present perfect. (Example: “Have you ever visited a stadium?”)","Use just, already, and yet accurately in writing. (Example: “I haven't finished my project yet.”)","Write short paragraphs about experiences, music, and achievements. (Example: “I have already played in a concert.”)"],"Use of English":["Use the present perfect to talk about experiences and recent events. (Example: “I have seen a carnival parade.”)","Form questions with Have you ever … ? and give short answers. (Example: “Yes, I have.”)","Use just, already, and yet appropriately. (Example: “She has just arrived.”)","Use since to indicate the starting point of an action or experience. (Example: “He has played football since 2018.”)"]}}},"K6":{"skillset":["Listening","Speaking","Reading","Writing","Use of English"],"units":{"1":{"Listening":["Understand and identify technology vocabulary in context. (e.g. “I use a laptop at school.”)","Recognise specific information when listening about websites and digital use. (e.g. “Type www dot example dot com.”)","Identify meaning in first and zero conditional sentences. (e.g. “If you click here, it opens.”)","Listen for main ideas and details in texts about technology and emotions. (e.g. “He feels jealous of his friend.”)"],"Speaking":["Describe technology and how we use digital devices. (e.g. “I use my phone to text.”)","Use the first conditional to talk about possible situations. (e.g. “If I study, I will pass.”)","Use the zero conditional to talk about general truths. (e.g. “If you press this, it works.”)","Express opinions and talk about feelings like jealousy. (e.g. “I feel jealous when my friend wins.”)"],"Reading":["Recognise and understand vocabulary related to computers and technology. (e.g. “Find ‘keyboard’.”)","Identify different text types (blogs, articles, messages). (e.g. “This is a blog.”)","Read for specific and general information in texts. (e.g. “He uses an app every day.”)","Understand ideas about emotions and social situations. (e.g. “Jealousy can cause problems.”)"],"Writing":["Write simple sentences about technology use. (e.g. “I use a computer for homework.”)","Write sentences using the first conditional. (e.g. “If I finish early, I will play.”)","Write sentences using the zero conditional. (e.g. “If you heat ice, it melts.”)","Answer questions and express ideas clearly in short texts. (e.g. “I use apps to learn English.”)"],"Use of English":["Use technology-related vocabulary accurately. (e.g. “Click the icon.”)","Use the first conditional structure correctly (if + present, will). (e.g. “If I click, it will open.”)","Use the zero conditional for general facts. (e.g. “If you mix red and blue, you get purple.”)","Use verbs related to computers appropriately. (e.g. “Download the file.”)"]},"2":{"Listening":["Recognise and identify vocabulary related to sports, competitions, and sports equipment in conversations, interviews, and classroom discussions. (e.g. “The cyclist is wearing a helmet.”)","Understand the present simple passive in listening activities about sports and routines. (e.g. “Football is played all over the world.”)","Identify the meaning of modal verbs used to describe possibility and prediction. (e.g. “It might rain during the match.”)","Listen for key information and specific details in texts about health, exercise, and sports history. (e.g. “Protein helps athletes build muscles.”)"],"Speaking":["Talk about sports, competitions, and sports equipment using complete sentences. (e.g. “Gymnastics is a sport played indoors.”)","Use the present simple passive to describe facts and habits. (e.g. “Tennis is played on a court.”)","Use modal verbs to express possibility, ability, and prediction. (e.g. “She could win the competition.”)","Discuss perseverance, exercise, and healthy lifestyles using simple opinions and explanations. (e.g. “Athletes need to persevere to improve.”)"],"Reading":["Read and recognise vocabulary related to sports and equipment accurately. (e.g. “surfboard”)","Read texts and identify examples of the present simple passive and modal verbs. (e.g. “Races are organised every year.”)","Read informational texts about Ancient Greek sports and healthy lifestyles to identify main ideas and details. (e.g. “Chariot races were popular in Ancient Greece.”)","Read critically and interpret ideas related to perseverance and physical health. (e.g. “Training regularly can improve performance.”)"],"Writing":["Write the names of sports, equipment, and health-related vocabulary correctly. (e.g. “water-skiing”)","Write sentences using the present simple passive accurately. (e.g. “Surfing is practised at the beach.”)","Write sentences with modal verbs to describe possibility and prediction. (e.g. “They may win the next game.”)","Write short texts about sports, exercise, and healthy habits using unit vocabulary. (e.g. “A healthy athlete should eat protein and exercise regularly.”)"],"Use of English":["Use the present simple passive to describe facts, routines, and processes. (e.g. “Ice-hockey is played on ice.”)","Use modal verbs accurately to express possibility, certainty, and ability. (e.g. “He might become a professional athlete.”)","Use vocabulary related to sports equipment and competitions appropriately in context. (e.g. “The player hit the ball with the racket.”)","Identify and use structural word classes in sentences. (e.g. “Quickly” is an adverb and “competition” is a noun.)"]},"3":{"Listening":["Recognise and identify vocabulary related to sports, competitions, and sports equipment in conversations, interviews, and classroom discussions. (e.g. “The cyclist is wearing a helmet.”)","Understand the present simple passive in listening activities about sports and routines. (e.g. “Football is played all over the world.”)","Identify the meaning of modal verbs used to describe possibility and prediction. (e.g. “It might rain during the match.”)","Listen for key information and specific details in texts about health, exercise, and sports history. (e.g. “Protein helps athletes build muscles.”)"],"Speaking":["Talk about sports, competitions, and sports equipment using complete sentences. (e.g. “Gymnastics is played indoors.”)","Use the present simple passive to describe facts and habits. (e.g. “Tennis is played on a court.”)","Use modal verbs to express possibility, ability, and prediction. (e.g. “She could win the competition.”)","Discuss perseverance, exercise, and healthy lifestyles using simple opinions and explanations. (e.g. “Athletes need to persevere to improve.”)"],"Reading":["Read and recognise vocabulary related to sports and equipment accurately. (e.g. “surfboard”)","Read texts and identify examples of the present simple passive and modal verbs. (e.g. “Races are organised every year.”)","Read informational texts about Ancient Greek sports and healthy lifestyles to identify main ideas and details. (e.g. “Chariot races were popular in Ancient Greece.”)","Read critically and interpret ideas related to perseverance and physical health. (e.g. “Training regularly can improve performance.”)"],"Writing":["Write the names of sports, equipment, and health-related vocabulary correctly. (e.g. “water-skiing”)","Write sentences using the present simple passive accurately. (e.g. “Surfing is practised at the beach.”)","Write sentences with modal verbs to describe possibility and prediction. (e.g. “They may win the next game.”)","Write short texts about sports, exercise, and healthy habits using unit vocabulary. (e.g. “A healthy athlete should eat protein and exercise regularly.”)"],"Use of English":["Use the present simple passive to describe facts, routines, and processes. (e.g. “Ice-hockey is played on ice.”)","Use modal verbs accurately to express possibility, certainty, and ability. (e.g. “He might become a professional athlete.”)","Use vocabulary related to sports equipment and competitions appropriately in context. (e.g. “The player hit the ball with the racket.”)","Identify and use structural word classes in sentences. (e.g. “Quickly” is an adverb and “competition” is a noun.)"]}}},"TeensB1":{"skillset":["Listening","Speaking","Reading","Writing","Use of English"],"units":{"1":{"Listening":["Understand and identify technology vocabulary in context. (e.g. “I use a laptop at school.”)","Recognise specific information when listening about websites and digital use. (e.g. “Type www dot example dot com.”)","Identify meaning in first and zero conditional sentences. (e.g. “If you click here, it opens.”)","Listen for main ideas and details in texts about technology and emotions. (e.g. “He feels jealous of his friend.”)"],"Speaking":["Describe technology and how we use digital devices. (e.g. “I use my phone to text.”)","Use the first conditional to talk about possible situations. (e.g. “If I study, I will pass.”)","Use the zero conditional to talk about general truths. (e.g. “If you press this, it works.”)","Express opinions and talk about feelings like jealousy. (e.g. “I feel jealous when my friend wins.”)"],"Reading":["Recognise and understand vocabulary related to computers and technology. (e.g. “Find ‘keyboard’.”)","Identify different text types (blogs, articles, messages). (e.g. “This is a blog.”)","Read for specific and general information in texts. (e.g. “He uses an app every day.”)","Understand ideas about emotions and social situations. (e.g. “Jealousy can cause problems.”)"],"Writing":["Write simple sentences about technology use. (e.g. “I use a computer for homework.”)","Write sentences using the first conditional. (e.g. “If I finish early, I will play.”)","Write sentences using the zero conditional. (e.g. “If you heat ice, it melts.”)","Answer questions and express ideas clearly in short texts. (e.g. “I use apps to learn English.”)"],"Use of English":["Use technology-related vocabulary accurately. (e.g. “Click the icon.”)","Use the first conditional structure correctly (if + present, will). (e.g. “If I click, it will open.”)","Use the zero conditional for general facts. (e.g. “If you mix red and blue, you get purple.”)","Use verbs related to computers appropriately. (e.g. “Download the file.”)"]},"2":{"Listening":["Understand and identify different types of music and related vocabulary. (e.g. “I like jazz and hip-hop.”)","Listen for specific information in short audio texts. (e.g. “The concert is on Saturday.”)","Recognise feelings and opinions in spoken language. (e.g. “She feels nervous before the show.”)","Use listening strategies to answer multiple-choice questions. (e.g. “The answer is B.”)"],"Speaking":["Describe music preferences using appropriate vocabulary. (e.g. “I like classical music.”)","Describe people using adjectives for personality and feelings. (e.g. “He is very cheerful.”)","Use short answers with so and nor to agree. (e.g. “I like jazz. So do I.”)","Talk about experiences and emotions related to music. (e.g. “I felt excited at the concert.”)"],"Reading":["Recognise and understand music-related vocabulary in texts. (e.g. “Find ‘festival’.”)","Understand diary entries and identify key ideas. (e.g. “She performed on stage.”)","Identify detailed information using reading strategies. (e.g. “Mozart was a composer.”)","Recognise paraphrasing in multiple-choice questions. (e.g. “The answer means the same.”)"],"Writing":["Write simple sentences describing music and events. (e.g. “The concert was amazing.”)","Use adjectives and adjective + preposition combinations. (e.g. “I am interested in music.”)","Summarise ideas from a text or diary entry. (e.g. “She was nervous but happy.”)","Write a short review of an event. (e.g. “I enjoyed the concert a lot.”)"],"Use of English":["Use adjectives and adjective + preposition combinations correctly. (e.g. “She is afraid of loud music.”)","Use so and nor for short answers and agreement. (e.g. “I love jazz. So do I.”)","Use vocabulary related to music and performance accurately. (e.g. “The band played on stage.”)","Apply reading and listening strategies effectively. (e.g. “Look for key words.”)"]},"3":{"Listening":["Recognise and identify vocabulary related to shopping, money, and prices in conversations and listening tasks. (e.g. “The shoes are on sale.”)","Understand the meaning of verb patterns with infinitives and gerunds in short dialogues. (e.g. “She enjoys shopping.”)","Identify specific details and opinions in listening activities about buying and selling. (e.g. “The customer wants to exchange the jacket.”)","Follow discussions involving suggestions, agreement, and disagreement. (e.g. “I think we should buy the cheaper one.”)"],"Speaking":["Talk about shopping experiences, prices, and products using complete sentences. (e.g. “I bought a second-hand backpack.”)","Use verb patterns with infinitives and gerunds accurately in conversations. (e.g. “I want to buy new shoes.”)","Use gerunds as subjects and objects to express opinions and habits. (e.g. “Shopping online is convenient.”)","Make suggestions and agree or disagree politely during discussions. (e.g. “We could go to the market instead.”)"],"Reading":["Read and recognise vocabulary related to shopping and money accurately. (e.g. “receipt”)","Read texts and identify verb patterns with infinitives and gerunds. (e.g. “He decided to save money.”)","Read narratives and infer meaning, emotions, and the value of gifts. (e.g. “The present was meaningful because it was handmade.”)","Read informational texts about the history of money and shopping practices. (e.g. “People used bartering before coins existed.”)"],"Writing":["Write vocabulary related to shopping, money, and sales accurately. (e.g. “reasonable”)","Write sentences using verb + infinitive and verb + gerund structures. (e.g. “She enjoys visiting markets.”)","Write sentences using gerunds as subjects and objects. (e.g. “Saving money is important.”)","Write short reviews, shopping tips, and opinion texts using unit language. (e.g. “The concert was amazing and worth the price.”)"],"Use of English":["Use verb + infinitive and verb + gerund patterns accurately. (e.g. “They agreed to help.”)","Use gerunds as subjects and objects in context. (e.g. “Buying second-hand clothes saves money.”)","Use vocabulary related to shopping, prices, and money appropriately. (e.g. “The shop assistant gave me my change.”)","Use expressions for suggesting, agreeing, and disagreeing during speaking tasks. (e.g. “I agree because the price is reasonable.”)"]}}},"TeensB2":{"skillset":["Listening","Speaking","Reading","Writing","Use of English"],"units":{"1":{"Listening":["Identify specific information and speaker attitude in extended listening tasks (Listening Part 3). (e.g. Selects the correct option after identifying the speaker’s opinion about living in the metaverse.)","Recognise and discriminate word stress patterns in multisyllabic words.","Interpret opinions and supporting reasons in discussions about community and connection.","Apply listening strategies to distinguish main ideas from supporting details."],"Speaking":["Compare and contrast visual prompts using appropriate present tenses (Speaking Part 2). (e.g. “In the first picture, people are living in a small house, while in the second picture they are living in a virtual space.”)","Use modifying comparatives and superlatives accurately to express nuanced differences.","Provide justified opinions using clear supporting reasons.","Express ideas about community and connection using topic-specific vocabulary."],"Reading":["Locate specific information in an article efficiently using scanning strategies.","Analyse arguments and identify the writer’s opinion and attitude in opinion-based texts. (e.g. Identifies why the writer believes the metaverse “is coming together.”)","Classify information into main ideas and supporting details.","Recognise and interpret present participle clauses within authentic reading texts."],"Writing":["Write a structured response expressing and justifying an opinion (Writing Part 2). (e.g. “Living in a small community is more beneficial because people feel more connected.”)","Use present simple and present continuous accurately within extended writing.","Incorporate present participle clauses function _isObj(o){return o&&typeof o==='object'&&!Array.isArray(o);}
function _mObj(a,b){if(!_isObj(a)||!_isObj(b))return b===undefined?a:b;var o={},k;for(k in a)o[k]=a[k];for(k in b)o[k]=(_isObj(a[k])&&_isObj(b[k]))?_mObj(a[k],b[k]):b[k];return o;}
/* Session identity for cloud merge & deletions. Cambridge Prep keeps ALL exam levels under one class id,
   so the key MUST include level (and the child for personalized) — otherwise two reports on the same date
   collide and one overwrites the other. */
function _sessKey(s){return (s.date||'')+'|'+(s.slot||'')+'|'+(s.level||'')+'|'+(s.personalized?(Object.keys(s.rows||{})[0]||'p'):'');}
function _mSessions(a,b){var o={},c;for(c in a)o[c]=(a[c]||[]).slice();for(c in b){var arr=o[c]||(o[c]=[]);var ix={};arr.forEach(function(s,i){ix[_sessKey(s)]=i;});(b[c]||[]).forEach(function(s){var k=_sessKey(s);if(ix[k]!=null){var e=arr[ix[k]],m={},p;for(p in e)m[p]=e[p];for(p in s)m[p]=s[p];m.rows=_mObj(e.rows||{},s.rows||{});arr[ix[k]]=m;}else{arr.push(s);ix[k]=arr.length-1;}});}return o;}
function _mAdded(a,b){var o={},c;for(c in a)o[c]=(a[c]||[]).slice();for(c in b){o[c]=o[c]||[];(b[c]||[]).forEach(function(n){if(o[c].indexOf(n)<0)o[c].push(n);});}return o;}
function _mById(a,b){var o=(a||[]).slice(),ix={};o.forEach(function(x,i){if(x&&x.id!=null)ix[x.id]=i;});(b||[]).forEach(function(x){if(x&&x.id!=null&&ix[x.id]!=null)o[ix[x.id]]=x;else o.push(x);});return o;}
function _mUniq(a,b){var o=(a||[]).slice();(b||[]).forEach(function(x){if(o.indexOf(x)<0)o.push(x);});return o;}
/* Tombstones = deletion markers. They travel inside the merged state so a delete
   survives the union-merge (and propagates to everyone) instead of being re-added
   from the cloud copy. Without these, deleting anything would "come back". */
function tombstone(key){STATE.tombstones=STATE.tombstones||{};STATE.tombstones[key]=Date.now();}
function applyTombstones(m){var T=m&&m.tombstones;if(!T)return m;var any=false,key;for(key in T){any=true;break;}if(!any)return m;
 if(m.sessions){for(var cid in m.sessions){m.sessions[cid]=(m.sessions[cid]||[]).filter(function(s){if(T['sess|'+cid+'|'+_sessKey(s)])return false;if(cid!=='cambridge_prep'&&T['sess|'+cid+'|'+(s.date||'')+'|'+(s.slot||'')])return false;return true;});}}
 if(m.addedStudents){for(var c2 in m.addedStudents){m.addedStudents[c2]=(m.addedStudents[c2]||[]).filter(function(n){return !T['stu|'+c2+'|'+n];});}}
 for(key in T){if(key.indexOf('stu|')===0){var pr=key.split('|'),sc=pr[1],sn=pr.slice(2).join('|');
   if(m.students)delete m.students[sc+'::'+sn];
   if(m.archived)delete m.archived[sc+'::'+sn];
   if(m.dollarAdj)delete m.dollarAdj[sc+'::'+sn];
   if(m.dollarAdjNote)delete m.dollarAdjNote[sc+'::'+sn];
   if(m.sessions&&m.sessions[sc])m.sessions[sc].forEach(function(s){if(s.rows)delete s.rows[sn];});}}
 if(m.customClasses)m.customClasses=m.customClasses.filter(function(x){return !(x&&x.id!=null&&T['cls|'+x.id]);});
 if(m.teacherTasks)m.teacherTasks=m.teacherTasks.filter(function(x){return !(x&&x.id!=null&&T['tsk|'+x.id]);});
 if(m.taskLog)m.taskLog=m.taskLog.filter(function(x){return !(x&&x.id!=null&&T['log|'+x.id]);});
 return m;}
function mergeStatesForSave(base,loc){var m={},k;for(k in base)m[k]=base[k];for(k in loc)if(!(k in m))m[k]=loc[k];
 m.sessions=_mSessions(base.sessions||{},loc.sessions||{});m.addedStudents=_mAdded(base.addedStudents||{},loc.addedStudents||{});
 m.customClasses=_mById(base.customClasses||[],loc.customClasses||[]);m.teacherTasks=_mById(base.teacherTasks||[],loc.teacherTasks||[]);m.taskLog=_mById(base.taskLog||[],loc.taskLog||[]);m.patches=_mUniq(base.patches||[],loc.patches||[]);
 ['skills','tests','notes','messages','actions','dollarAdj','dollarAdjNote','classMeta','students','archived','fluent','camb','coordNotes','trials','projects','unitsAdd','parentDevNote','attnResolved'].forEach(function(key){if(base[key]!==undefined||loc[key]!==undefined)m[key]=_mObj(base[key]||{},loc[key]||{});});
 m.tombstones=_mObj(base.tombstones||{},loc.tombstones||{});
 return applyTombstones(m);}

  /* Merge the remote change INTO local (never replace) so in-progress local work is preserved. */

  try{applyClassMeta();}catch(e){}
  /* Never re-render (which would wipe a half-typed form) while someone is actively editing.
     The merged STATE is already current; the UI refreshes on their next save/navigation. */
  var ae=document.activeElement;
  var busy=REPORT_DIRTY||(ae&&/^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName))||document.querySelector('.od-overlay');

/* These classes score unit tests out of 10; target met = 80% (>=8). Only these levels. */
function testMaxFor(c){return (c&&(c.level==='K1'||c.level==='K6'||c.level==='TeensB1'))?10:(c&&(c.level==='K2'||c.level==='K3'||c.level==='K4'||c.level==='K5'||c.level==='TeensB2'))?30:null;}
/* Test result tier, proportional to this class's maximum (10 for K1/K6/TeensB1, 30 for K2-K5). 2=solid, 1=developing, 0=below. */
function testTier(score,c){const m=testMaxFor(c)||30;const r=Number(score)/m;return r>=0.73?2:(r>=0.5?1:0);}
function testTheme(fb){fb=String(fb||'').toLowerCase();
 if(/vocab|word|crayon|name of|noun/.test(fb))return 'vocabulary';
 if(/listen/.test(fb))return 'listening';
 if(/read/.test(fb))return 'reading';
 if(/writ|letter|mirror|spell|trace/.test(fb))return 'writing';
 if(/understand|instruct|confus|didn'?t get|did not get/.test(fb))return 'comprehension of instructions';
 if(/grammar|structure|sentence|tense/.test(fb))return 'sentence structure';
 if(/speak|pronun|oral/.test(fb))return 'speaking';
 if(/number|count|math/.test(fb))return 'numeracy';
 return '';}
/* Coordination-facing (teaching lens): what to reinforce and where to aim the teaching. Never shown to parents. */
function coordTestFocus(t,c){if(t.score==null)return 'Not sat yet — schedule when possible.';
 const tier=testTier(t.score,c);const th=testTheme(t.feedback);
 if(tier===2)return th?`Strong result. Extend ${th} with higher-order, open-ended tasks.`:'Strong result. Extend with challenge tasks.';
 if(tier===1)return th?`Reinforce ${th} with short, multisensory review; recheck before written work.`:'Consolidate this unit with spaced, multisensory review.';
 return th?`Gap in ${th}: reteach explicitly, check comprehension first, and monitor closely.`:'Below range: reteach the core content and monitor closely.';}

 try{sessionsOf('fluent_steps').forEach(s=>{const d=s.date||'';if(d>lastClass)lastClass=d;const rows=s.rows||{};Object.keys(rows).forEach(rn=>{if(((displayName('fluent_steps',rn)||rn)+'').trim().toLowerCase()===full&&(rows[rn].att==='Present'||rows[rn].att==='Late')&&d>lastPresent)lastPresent=d;});});}catch(e){}

function daysSince(iso){if(!iso)return 999;return Math.floor((Date.now()-new Date(iso).getTime())/864e5);}

/* Calendar-based overdue: a class is behind only when a scheduled lesson date (from the
   School Calendar, which already excludes holidays & vacation) has passed with no report. */
/* Weekday of a YYYY-MM-DD date (noon-safe against timezones). */
function _wd(d){return new Date(d+'T12:00:00').getDay();}
/* Parse a class "days" label (e.g. "Wed & Fri", "Tue & Thu", "Mon") into weekday numbers. */
function daysToWeekdays(s){s=String(s||'');var M={Sun:0,Mon:1,Tue:2,Wed:3,Thu:4,Fri:5,Sat:6},out=[],k;for(k in M){if(new RegExp(k,'i').test(s))out.push(M[k]);}return out;}
/* Calendar for ANY class so every class (incl. custom/new ones like Toddlers) is tracked, not just the
   hardcoded SCHEDULE ones. Falls back to the real school-calendar dates that land on the class's weekdays
   (so holidays/vacation stay excluded), clipped to start at the class's first report. Read-only. */
function scheduleFor(c){
 if(!c)return [];
 if(SCHEDULE[c.id]&&SCHEDULE[c.id].length)return SCHEDULE[c.id];
 var wds=daysToWeekdays(c.days);if(!wds.length)return [];
 var all={},k;for(k in SCHEDULE){(SCHEDULE[k]||[]).forEach(function(d){if(wds.indexOf(_wd(d))>=0)all[d]=1;});}
 var arr=Object.keys(all).sort();
 var dates=sessionsOf(c.id).map(function(s){return s.date;}).filter(Boolean).sort();
 if(dates.length)arr=arr.filter(function(d){return d>=dates[0];});
 else if(arr.length>8)arr=arr.slice(-8);
 return arr;
}
function isOverdue(c){
 const reps=sessionsOf(c.id).map(s=>s.date).filter(Boolean).sort();
 const last=reps.length?reps[reps.length-1]:null;
 const sched=scheduleFor(c);
 if(!sched||!sched.length)return{tracked:false,overdue:false,last,gap:0,missing:0,totalMissing:0};
 const today=todayISO();
 const near=d=>reps.some(r=>Math.abs((new Date(d)-new Date(r))/864e5)<=3);
 const past=sched.filter(d=>d<=today);
 const lastScheduled=past.length?past[past.length-1]:null;
 // CURRENT streak: count unreported scheduled classes from the most recent one backwards,
 // stopping at the first one that has a report. Old historical gaps don't make a class "currently overdue".
 let streak=0;for(let i=past.length-1;i>=0;i--){if(near(past[i]))break;streak++;}
 const totalMissing=past.filter(d=>!near(d)).length;
 const overdue=streak>0;
 return{tracked:true,overdue,last,missing:streak,totalMissing,
   lastScheduled,lastMissing:overdue?lastScheduled:null,gap:overdue&&lastScheduled?daysSince(lastScheduled):0};
}

function classStats(id){
 const ss=sessionsOf(id);let present=0,absent=0,late=0,hwDone=0,hwMiss=0,dollars=0,attTotal=0;
 ss.forEach(s=>Object.values(s.rows||{}).forEach(r=>{
  if(r.att==="Present"){present++;attTotal++;}else if(r.att==="Absent"){absent++;attTotal++;}else if(r.att==="Late"){late++;attTotal++;}
  if(r.hw==="Done")hwDone++;else if(r.hw==="Didn't do")hwMiss++;dollars+=Number(r.dollar)||0;}));
 return{sessions:ss.length,present,absent,late,hwDone,hwMiss,dollars,total:attTotal,
  attRate:attTotal?Math.round(present/attTotal*100):null,hwRate:(hwDone+hwMiss)?Math.round(hwDone/(hwDone+hwMiss)*100):null};
}
function studentStats(id,name){
 const ss=sessionsOf(id);let p=0,a=0,l=0,hd=0,hm=0,dollars=0,seen=0,attDen=0;
 ss.forEach(s=>{const r=(s.rows||{})[name];if(r){seen++;
  if(r.att==="Present"){p++;attDen++;}else if(r.att==="Absent"){a++;attDen++;}else if(r.att==="Late"){l++;attDen++;}
  if(r.hw==="Done")hd++;else if(r.hw==="Didn't do")hm++;dollars+=Number(r.dollar)||0;}});
 dollars+=(STATE.dollarAdj&&STATE.dollarAdj[id+'::'+name])||0;
 return{p,a,l,hd,hm,dollars,seen,attRate:attDen?Math.round(p/attDen*100):null,hwRate:(hd+hm)?Math.round(hd/(hd+hm)*100):null};
}
function weakSkills(id,name){const sk=STATE.skills[id]||{};const dev=new Set();Object.values(sk).forEach(per=>{const r=per[name];if(r)Object.entries(r).forEach(([s,v])=>{if(v==="Developing"||v==="Emerging")dev.add(s);});});return[...dev];}
function strongSkills(id,name){const sk=STATE.skills[id]||{};const pr=new Set();Object.values(sk).forEach(per=>{const r=per[name];if(r)Object.entries(r).forEach(([s,v])=>{if(v==="Proficient"||v==="Confident")pr.add(s);});});return[...pr];}
function lowTest(id,name){const c=getClass(id);const mx=testMaxFor(c);const thr=mx?mx*0.8:15;const t=STATE.tests[id]||{};let msg=null;Object.entries(t).forEach(([u,rows])=>rows.forEach(r=>{if(r.student===name&&r.score!=null&&r.score<thr)msg=mx?`Test ${u} below target (${r.score}/${mx})`:`Test ${u} below average (${r.score})`;}));return msg;}
function attnReasons(id,name){const st=studentStats(id,name);const reasons=[];
  if(st.seen>=2&&st.attRate!=null&&st.attRate<70)reasons.push(`Low attendance (${st.attRate}%)`);
  if(st.a>=2)reasons.push(`${st.a} absences`);
  if(st.seen>=2&&st.hwRate!=null&&st.hwRate<60)reasons.push(`Homework gap (${st.hwRate}%)`);
  const weak=weakSkills(id,name);if(weak.length)reasons.push(`Developing: ${weak.join(", ")}`);
  const lt=lowTest(id,name);if(lt)reasons.push(lt);
  return reasons;}
function attentionList(id){const c=getClass(id);if(c.fluent)return[];const out=[];activeStudents(c).forEach(n=>{const reasons=attnReasons(id,n);if(reasons.length)out.push({name:n,reasons});});return out;}
/* Resolve-for-now + auto re-alert. Resolving snapshots the child's current negatives; the child stays
   off the active list UNLESS a NEW negative appears (a new absence, a new missed homework, a unit test
   below target, or a new developing skill), in which case they are flagged again automatically. */
function lowTestKeys(id,name){const c=getClass(id);const mx=testMaxFor(c);const thr=mx?mx*0.8:15;const t=STATE.tests[id]||{};const ks=[];Object.entries(t).forEach(([u,rows])=>rows.forEach(r=>{if(r.student===name&&r.score!=null&&r.score<thr&&ks.indexOf(u)<0)ks.push(u);}));return ks.sort();}
function attnSnap(id,name){const st=studentStats(id,name);return {a:st.a,hm:st.hm,weak:weakSkills(id,name).slice().sort(),tests:lowTestKeys(id,name)};}
function attnResolvedRec(id,name){return (STATE.attnResolved||{})[id+'::'+name]||null;}
function attnStatus(id,name){const reasons=attnReasons(id,name);if(!reasons.length)return 'ok';const r=attnResolvedRec(id,name);if(!r)return 'active';const sn=attnSnap(id,name);const newIssue=(sn.a>(r.a||0))||(sn.hm>(r.hm||0))||sn.weak.some(w=>(r.weak||[]).indexOf(w)<0)||sn.tests.some(t=>(r.tests||[]).indexOf(t)<0);return newIssue?'active':'resolved';}
function attnActiveList(id){return attentionList(id).filter(a=>attnStatus(id,a.name)==='active');}
function attnResolvedList(id){return attentionList(id).filter(a=>attnStatus(id,a.name)==='resolved');}

function reopenAttn(id,name){STATE.attnResolved=STATE.attnResolved||{};delete STATE.attnResolved[id+'::'+name];save();toast('↩ Reopened — back to attention');renderClass(id);}
function tabAttnResolved(id){const list=attnResolvedList(id);
 if(!list.length)return '<div class="card"><h3>🚦 Resolved for now</h3><p class="muted">Nothing here right now. When you mark an attention item as resolved, it moves here, and it will alert again automatically if a new gap appears.</p></div>';
 const rows=list.map(a=>{const ns=esc(a.name).replace(/'/g,"\\'");const r=attnResolvedRec(id,a.name)||{};const when=r.ts?(' · resolved '+esc(r.ts)):'';const was=(r.reasons&&r.reasons.length)?r.reasons.join(' · '):a.reasons.join(' · ');
  return `<div class="flag ok" style="align-items:flex-start"><span class="fi">✅</span><div style="flex:1"><b>${esc(displayName(id,a.name))}</b> <span class="muted small">${when}</span><div class="small muted" style="margin-top:2px">Was flagged for: ${esc(was)}</div>${actionRows(id,a.name)}<div style="margin-top:6px"><button class="btn ghost sm" onclick="openStudent('${id}','${ns}','report')">📄 Report</button> <button class="btn ghost sm" onclick="openStudent('${id}','${ns}','history')">📜 History</button> <button class="btn ghost sm" onclick="reopenAttn('${id}','${ns}')">↩ Reopen attention</button></div></div></div>`;}).join('');
 return `<div class="card"><h3>🚦 Resolved for now <span class="muted small">(${list.length})</span></h3>
  <p class="hint">These children previously needed attention and were marked resolved, so they stay off the Overview to keep it clean. <b>They alert again automatically</b> on any new gap: a new absence, a missed homework, a unit test below target, or a new developing skill.</p>
  ${rows}</div>`;}
function pendingObs(id){const c=getClass(id);if(c.fluent)return[];const act=new Set(activeStudents(c));const out=[];sessionsOf(id).forEach(s=>{if(!s.date)return;const miss=[];const r=s.rows||{};let anyActiveObs=false;Object.keys(r).forEach(n=>{if(!act.has(n))return;const v=r[n]||{};if(v.obs&&String(v.obs).trim())anyActiveObs=true;if((v.att==='Present'||v.att==='Late')&&!(v.obs&&String(v.obs).trim()))miss.push(displayName(id,n));});
 if(!anyActiveObs){out.push({date:s.date,students:[],generalOnly:true});}
 else if(miss.length){out.push({date:s.date,students:miss});}});out.sort((a,b)=>(a.date||'').localeCompare(b.date||''));return out;}
function kdSem(){const now=new Date();const y=now.getFullYear();const start=new Date(y,1,1);const end=new Date(y,5,30);let frac=(now-start)/(end-start);frac=Math.max(0,Math.min(1,frac));return{frac,expected:Math.round(200*frac),pct:Math.round(frac*100)};}
function kdCheck(id){const c=getClass(id);if(!c.kidDollar)return null;const sem=kdSem();const target=Math.round(sem.expected*0.85);const behind=[];activeStudents(c).forEach(n=>{const d=studentStats(id,n).dollars;if(sem.expected>0&&d<target)behind.push({name:n,dollars:d,gap:Math.max(1,sem.expected-d)});});behind.sort((a,b)=>a.dollars-b.dollars);return{expected:sem.expected,target,pct:sem.pct,behind};}

/* Card order: by age (youngest first), then morning (AM) before afternoon (PM), then name.
   Cambridge Prep, Fluent Steps and Pietro (1:1) always go last, in that order.
   Recomputed on every render, so adding a class or changing its age reorders automatically. */
function classAgeNum(c){const L=LEVELS[c.level]||{};const a=String(c.age||L.age||'');const m=a.match(/\d+/);return m?Number(m[0]):999;}
function classTimeRank(c){const t=String(c.time||'').toUpperCase();if(t.indexOf('AM')>=0)return 0;if(t.indexOf('PM')>=0)return 1;return 2;}
function isSpecialClass(c){return c.special==='cambridge'||!!c.fluent||c.id==='pietro_1on1'||c.level==='Private';}
function specialOrder(c){return c.special==='cambridge'?0:(c.fluent?1:2);}
/* Canonical class ordering used EVERYWHERE: by age (youngest first), then AM before PM, then name;
   special classes (Cambridge, Fluent, Private) last. Applied to the live CLASSES list itself in
   applyClassMeta, so every table/list/dropdown inherits it and new classes slot in by age automatically. */
function classCmp(a,b){
  const sa=isSpecialClass(a)?1:0,sb=isSpecialClass(b)?1:0;
  if(sa!==sb)return sa-sb;
  if(sa)return specialOrder(a)-specialOrder(b)||((a.name||'').localeCompare(b.name||''));
  const ag=classAgeNum(a)-classAgeNum(b);if(ag)return ag;
  const tr=classTimeRank(a)-classTimeRank(b);if(tr)return tr;
  return (a.name||'').localeCompare(b.name||'');
}
function sortedClasses(){return CLASSES.slice().sort(classCmp);}

function cambLastMockIdx(name){const arr=(cambState().mocks[name]||[]);if(!arr.length)return -1;let bi=0;for(let i=1;i<arr.length;i++){if((arr[i].date||'')>=(arr[bi].date||''))bi=i;}return bi;}
function daysTo(d){if(!d)return null;return Math.ceil((new Date(d)-Date.now())/864e5);}
function cambBand(name){const ms=cambMocks(name);if(!ms.length)return null;const lvl=cambLevelOf(name)||CAMB_LEVEL;
 const overalls=[];ms.forEach(function(m){const pcts=[];Object.keys(m.papers||{}).forEach(function(p){const pct=cambPaperPct(lvl,p,m.papers[p]);if(pct!=null)pcts.push(pct);});if(pcts.length)overalls.push(Math.round(pcts.reduce((a,b)=>a+b,0)/pcts.length));});
 if(!overalls.length)return null;const avg=Math.round(overalls.reduce((a,b)=>a+b,0)/overalls.length);
 let label,cls;if(avg>=85){label='Exam-ready';cls='b-prof';}else if(avg>=70){label='On track';cls='b-present';}else if(avg>=50){label='Developing';cls='b-late';}else{label='Needs strong support';cls='b-absent';}
 const last=ms[ms.length-1];return {avg,label,cls,papers:last.papers,date:last.date,mockCount:overalls.length};}

function cambBandCard(name){
 const lvl=cambLevelOf(name);if(!lvl)return '';
 const info=CAMB_INFO[lvl];const b=cambBand(name);const ms=cambMocks(name);const ex=cambExam(name);const dt=daysTo(ex);const closed=cambClosed(name);const papers=info.papers;

   const pct=cambPaperPct(lvl,p,raw);const mx=cambMax(lvl,p);const disp=(raw==null||raw==='')?'—':(mx?(raw+'/'+mx):(raw+'%'));
   return `<div style="margin-bottom:6px"><div class="small" style="display:flex;justify-content:space-between"><span>${esc(p)}</span><span>${disp}${pct!=null?(' · '+pct+'%'):''}</span></div><div style="background:var(--soft);border-radius:6px;height:10px"><div style="width:${pct==null?0:Math.min(100,pct)}%;height:10px;border-radius:6px;background:${pct==null?'#ccc':pct>=70?'var(--green)':pct>=50?'var(--orange)':'var(--bad)'}"></div></div></div>`;}).join(''):'<p class="muted small">No mock recorded yet — add one in the Mock Tests tab.</p>';
 const hist=ms.length?`<div class="tbl-wrap" style="margin-top:8px"><table><tr><th>Mock date</th>${papers.map(p=>`<th>${esc(p)}${cambMax(lvl,p)?(' /'+cambMax(lvl,p)):''}</th>`).join('')}<th>Avg</th></tr>${ms.map(m=>{const pcts=[];papers.forEach(p=>{const pct=cambPaperPct(lvl,p,(m.papers||{})[p]);if(pct!=null)pcts.push(pct);});const a=pcts.length?Math.round(pcts.reduce((x,y)=>x+y,0)/pcts.length)+'%':'—';return `<tr><td>${esc(m.date||'')}</td>${papers.map(p=>{const val=(m.papers||{})[p];if(cambIsSpeaking(p))return `<td>${val?esc(String(val)):'—'}</td>`;if(cambIsWritingEstimate(lvl,p)){const wp=cambPaperPct(lvl,p,val);return `<td>${wp==null?'—':wp+'% <span class="muted small">(est.)</span>'}</td>`;}return `<td>${(val==null||val==='')?'—':esc(String(val))}</td>`;}).join('')}<td><b>${a}</b></td></tr>`;}).join('')}</table></div>`:'';
 return `<div class="card" style="border-color:#D9C2E8">

}

/* ===== Cambridge Prep — Extra Activity: weekly extra exercises tracked per candidate, with auto-updating analysis. ===== */
function cambExtraAll(){const cs=cambState();cs.extra=cs.extra||{};return cs.extra;}
function cambExtraOf(name){return (cambExtraAll()[name]||[]).slice().sort((a,b)=>(b.delivered||'').localeCompare(a.delivered||''));}
function cambExtraParticipants(){const e=cambExtraAll();return Object.keys(e).filter(n=>(e[n]||[]).length);}
function ceFmt(d){if(!d)return '';try{const x=new Date(d);if(isNaN(x))return d;return x.toLocaleDateString('en-GB',{day:'2-digit',month:'short',timeZone:'UTC'});}catch(e){return d;}}
function cambSkillOf(part){const p=(part||'').toLowerCase();if(p.indexOf('listen')>=0)return 'Listening';if(p.indexOf('speak')>=0)return 'Speaking';if(p.indexOf('use of english')>=0)return 'Use of English';if(p.indexOf('read')>=0||p.indexOf('writing')>=0)return 'Reading & Writing';return (part||'Other');}
function cambExtraAnalysis(name){const acts=cambExtraOf(name);if(!acts.length)return '';
 const bySkill={};let totalParts=0,allErrors='';
 acts.forEach(a=>(a.parts||[]).forEach(p=>{totalParts++;const sk=cambSkillOf(p.part);bySkill[sk]=bySkill[sk]||{count:0,err:0};bySkill[sk].count++;if(p.errors&&String(p.errors).trim()){bySkill[sk].err++;allErrors+=' '+p.errors;}}));
 if(!totalParts)return '';
 const f=((displayName('cambridge_prep',name)||name)+'').split(' ')[0];
 const skills=Object.keys(bySkill);const weak=skills.filter(s=>bySkill[s].err>0).sort((x,y)=>bySkill[y].err-bySkill[x].err);const strong=skills.filter(s=>bySkill[s].err===0&&bySkill[s].count>0);
 let s=`Across ${acts.length} exercise${acts.length>1?'s':''} (${totalParts} part${totalParts>1?'s':''}), `;
 if(weak.length){s+=`${f} has the most to work on in ${weak.slice(0,2).join(' and ')}`;const blob=allErrors.toLowerCase();const th=[];
   if(/spell/.test(blob))th.push('spelling');if(/tense|verb|grammar|past|present/.test(blob))th.push('verb tenses');if(/vocab|word/.test(blob))th.push('vocabulary');if(/prepos/.test(blob))th.push('prepositions');if(/instruction|read the|did ?n.?t|understand/.test(blob))th.push('reading the instructions carefully');if(/plural|singular/.test(blob))th.push('plurals');
   if(th.length)s+=`, especially ${th.slice(0,2).join(' and ')}`;s+='. ';
 }else{s+=`${f} is completing the exercises well, with very few errors so far. `;}
 if(strong.length)s+=`Consistent and strong in ${strong.slice(0,2).join(' and ')}. `;
 s+=`Keep reinforcing the weaker parts in the next exercises and review them together; if the same errors keep appearing, it is worth a quick note to the family.`;
 return esc(s);}
function cambExtra(id){const parts=cambExtraParticipants();
 return `<div class="card"><h3>🏋️ Extra Activity <button class="btn orange sm no-print" style="float:right" onclick="cambExtraAddModal()">➕ Add exercise</button></h3>
   <p class="hint">Weekly extra exercises for the candidates we are following until classes resume (delivered one week, returned the next). Log the corrected parts (e.g. “Listening Part 1”) and the errors noted; the analysis updates as you go, so we can see where to improve and alert the family if needed. It also appears in the child's Cambridge report.</p></div>
   ${parts.length?parts.map(cambExtraStudentCard).join(''):'<div class="card"><p class="muted">No extra exercises logged yet. Click “➕ Add exercise” to start.</p></div>'}`;}
function cambExtraStudentCard(name){const acts=cambExtraOf(name);const an=cambExtraAnalysis(name);
 return `<div class="card" style="border-color:var(--purple)"><h3 style="color:var(--purple)">🎓 ${esc(displayName('cambridge_prep',name))} <span class="muted small">${esc(cambLevelOf(name)||(acts[0]&&acts[0].level)||'')}</span></h3>
   ${an?`<div class="flag ok"><span class="fi">📈</span><div><b>Where to improve:</b> ${an}</div></div>`:''}

     <p class="small"><b>What “learned the sound” means:</b> <b>Recognises</b> = hears & says the pure sound; <b>Blends & reads</b> = uses it to read words (s-a-t → “sat”); <b>Secure</b> = reads & writes it confidently with the correct letter formation.</p>

function removeTeacher(t){if(teacherClassIds(t).length){toast('Reassign their classes first (edit each class above).');return;}
 if(!confirm('⚠️ Permanently remove '+t+" from the panel?\n\nTheir leftover personal/general tasks and action log will be erased for everyone and cannot be undone. Class reports stay with the classes."))return;
 ensureTasks();
 STATE.teacherTasks.filter(x=>!x.classId&&x.teacher===t).forEach(x=>{if(x&&x.id!=null)tombstone('tsk|'+x.id);});
 STATE.taskLog.filter(l=>l.teacher===t).forEach(l=>{if(l&&l.id!=null)tombstone('log|'+l.id);});
 STATE.teacherTasks=STATE.teacherTasks.filter(x=>!(!x.classId&&x.teacher===t));STATE.taskLog=STATE.taskLog.filter(l=>l.teacher!==t);if(TEACHER_SEL===t)TEACHER_SEL=null;save();toast('🗑 Teacher removed');render();}
